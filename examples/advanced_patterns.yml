# playbooks/advanced_patterns.yml — catalog of advanced Ansible patterns
#
# This file is a teaching reference that concentrates as many advanced
# patterns as possible in one place. It is not meant to run end-to-end;
# use it for reading and copy-pasting.
#
# Covers:
#   vars_prompt / pause / add_host / group_by
#   meta directives / throttle / environment
#   magic variables / hostvars / groups
#   built-in lookups / advanced Jinja2
#   uri REST API / wait_for / raw / script
#   include_role (dynamic) / import_role (static)

---
# ════════════════════════════════════════════════════════════════════════════
# PLAY 1: vars_prompt — interactive variable input
# ════════════════════════════════════════════════════════════════════════════
- name: Interactive deployment with vars_prompt
  hosts: localhost
  gather_facts: false

  # vars_prompt: prompt the user for input before the play runs.
  # Fits: sensitive operations that need manual confirmation (deploy version, one-off scripts).
  vars_prompt:
    - name: deploy_version
      prompt: "Enter the version to deploy (e.g. v2.3.0)"
      default: "latest"
      private: false      # private: true suppresses echo (passwords)

    - name: confirm_action
      prompt: "Deploy to production? (yes/no)"
      default: "no"
      private: false

  tasks:
    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Deployment cancelled."
      when: confirm_action != "yes"

    - name: Show deploy target
      ansible.builtin.debug:
        msg: "Deploying version {{ deploy_version }} to production"


# ════════════════════════════════════════════════════════════════════════════
# PLAY 2: add_host + group_by — mutate the inventory at runtime
# ════════════════════════════════════════════════════════════════════════════
- name: Dynamically build inventory at runtime
  hosts: all
  gather_facts: true

  tasks:
    # group_by: create groups dynamically from a fact.
    # Use case: inventory is not grouped by OS but a role needs Debian/RedHat distinction.
    - name: Group hosts by OS family
      ansible.builtin.group_by:
        key: "os_{{ ansible_os_family | lower }}"
      changed_when: false
      tags: [grouping]

    # group_by on memory size (used for tier-differentiated configuration later)
    - name: Group hosts by memory tier
      ansible.builtin.group_by:
        key: >-
          mem_{{ 'large' if ansible_memtotal_mb > 8192
                 else 'medium' if ansible_memtotal_mb > 2048
                 else 'small' }}
      changed_when: false
      tags: [grouping]

    # add_host: add a host at runtime (commonly used right after creating a cloud instance).
    - name: Register newly provisioned host
      ansible.builtin.add_host:
        name: "new-app-01.example.com"
        ansible_host: "10.0.1.100"
        groups:
          - webservers
          - newly_provisioned
        # Arbitrary extra variables can be attached here
        env: production
        app_version: "v2.3.0"
      changed_when: false
      tags: [add_host]

# Subsequent plays can then target the groups created by group_by.
- name: Configure Debian-specific settings
  hosts: os_debian
  gather_facts: false
  tasks:
    - name: Example Debian-only task
      ansible.builtin.debug:
        msg: "Running on Debian family: {{ ansible_distribution }}"


# ════════════════════════════════════════════════════════════════════════════
# PLAY 3: meta directives — controlling play flow
# ════════════════════════════════════════════════════════════════════════════
- name: Demonstrate meta directives
  hosts: all
  gather_facts: false

  tasks:
    - name: Some setup task
      ansible.builtin.debug:
        msg: "Setup complete"

    # meta: flush_handlers
    # Default:         handlers run at the end of the play
    # flush_handlers:  run all triggered handlers now, then continue with later tasks
    # Use case:        after restarting a service, verify its state immediately
    - name: Flush handlers now (don't wait until end of play)
      ansible.builtin.meta: flush_handlers

    - name: Check if host meets requirements
      ansible.builtin.set_fact:
        meets_requirements: "{{ ansible_memtotal_mb > 512 }}"

    # meta: end_host — skip the remaining tasks for this host; other hosts continue.
    - name: Skip low-memory hosts for this play
      ansible.builtin.meta: end_host
      when: not meets_requirements

    # meta: end_play — end the whole play (all hosts) without failing.
    # Use case: already at target version, no need to continue.
    # - name: End play if nothing to do
    #   ansible.builtin.meta: end_play
    #   when: current_version == target_version

    - name: Continue with capable hosts
      ansible.builtin.debug:
        msg: "This host has enough memory"


# ════════════════════════════════════════════════════════════════════════════
# PLAY 4: throttle + environment — flow control and environment variables
# ════════════════════════════════════════════════════════════════════════════
- name: Demonstrate throttle and environment
  hosts: all
  gather_facts: false

  tasks:
    # throttle: cap the number of hosts running this task concurrently.
    # Difference from serial: serial batches the whole play; throttle limits one task.
    # Use case: downloading the same file from many hosts — avoid crushing the origin.
    - name: Download large artifact (throttle to 2 concurrent)
      ansible.builtin.get_url:
        url: https://example.com/releases/app-v2.tar.gz
        dest: /tmp/app.tar.gz
        mode: "0644"
      throttle: 2    # at most 2 hosts run this task at a time

    # environment: set environment variables for a task.
    # Common: proxy settings, temporary PATH, build flags.
    - name: Run script with custom environment
      ansible.builtin.command: /opt/scripts/deploy.sh
      environment:
        HTTP_PROXY: "http://proxy.example.com:3128"
        HTTPS_PROXY: "http://proxy.example.com:3128"
        NO_PROXY: "localhost,127.0.0.1,10.0.0.0/8"
        APP_ENV: "{{ env | default('production') }}"
        JAVA_OPTS: "-Xmx2g -Xms512m"
      changed_when: false

    # Play-level environment (applies to every task) is declared in the play header:
    # environment:
    #   HTTP_PROXY: "..."


# ════════════════════════════════════════════════════════════════════════════
# PLAY 5: Magic Variables — hostvars / groups / inventory_hostname
# ════════════════════════════════════════════════════════════════════════════
- name: Demonstrate magic variables
  hosts: webservers
  gather_facts: true

  tasks:
    # hostvars: access variables belonging to another host.
    # Use case: a webserver needs to know the DB server's IP.
    - name: Get primary DB server IP via hostvars
      ansible.builtin.set_fact:
        primary_db_host: >-
          {{ hostvars[groups['dbservers'] | first]['ansible_default_ipv4']['address']
             | default('127.0.0.1') }}
      tags: [hostvars]

    - name: Show primary DB host
      ansible.builtin.debug:
        msg: "Primary DB IP: {{ primary_db_host }}"

    # groups: list the members of a group.
    - name: Build list of all webserver IPs
      ansible.builtin.set_fact:
        webserver_ips: >-
          {{ groups['webservers']
             | map('extract', hostvars, ['ansible_default_ipv4', 'address'])
             | select('defined')
             | list }}
      tags: [groups]

    # inventory_hostname vs ansible_hostname:
    #   inventory_hostname: the name defined in inventory (may be an FQDN)
    #   ansible_hostname:   the hostname reported by the target system (may differ)
    - name: Compare inventory vs system hostname
      ansible.builtin.debug:
        msg:
          - "inventory_hostname: {{ inventory_hostname }}"
          - "ansible_hostname: {{ ansible_hostname }}"
          - "ansible_fqdn: {{ ansible_fqdn }}"
          - "inventory_hostname_short: {{ inventory_hostname_short }}"

    # ansible_play_hosts: all hosts active in the current play.
    # ansible_play_batch: the hosts in the current serial batch.
    - name: Show play hosts info
      ansible.builtin.debug:
        msg:
          - "All play hosts: {{ ansible_play_hosts }}"
          - "Current batch: {{ ansible_play_batch }}"
          - "Play name: {{ ansible_play_name }}"


# ════════════════════════════════════════════════════════════════════════════
# PLAY 6: Built-in lookups — read data from the control node
# ════════════════════════════════════════════════════════════════════════════
- name: Demonstrate lookup plugins
  hosts: localhost
  gather_facts: false

  vars:
    # lookup vs query:
    #   lookup: returns a comma-joined string (legacy behavior)
    #   query:  always returns a list (recommended for new code)

    # file: read a file from the control node.
    ssh_pub_key: "{{ lookup('ansible.builtin.file', '~/.ssh/id_rsa.pub', errors='ignore') }}"

    # env: read an environment variable on the control node.
    ci_build_number: "{{ lookup('ansible.builtin.env', 'CI_BUILD_NUMBER', default='local') }}"

    # pipe: run a command on the control node and capture its output.
    current_git_commit: "{{ lookup('ansible.builtin.pipe', 'git rev-parse --short HEAD') }}"

    # password: generate or read a random password (persisted to a file automatically).
    generated_secret: "{{ lookup('ansible.builtin.password', '/tmp/demo_secret length=24 chars=ascii_letters,digits') }}"

    # template: render a Jinja2 template and return the string (no file is written).
    # rendered_config: "{{ lookup('ansible.builtin.template', 'templates/config.j2') }}"

    # url: fetch HTTP/HTTPS content (request made from the control node).
    # remote_version: "{{ lookup('ansible.builtin.url', 'https://api.example.com/version') }}"

    # ini: read values from an .ini / .properties file.
    # db_host: "{{ lookup('ansible.builtin.ini', 'host section=database file=app.conf') }}"

    # csvfile: read a value from a CSV file.
    # user_email: "{{ lookup('ansible.builtin.csvfile', 'alice file=users.csv delimiter=, col=1') }}"

  tasks:
    - name: Show lookup results
      ansible.builtin.debug:
        msg:
          - "CI Build: {{ ci_build_number }}"
          - "Git commit: {{ current_git_commit }}"

    # query('inventory_hostnames'): list hosts matching a pattern.
    - name: List all production hosts
      ansible.builtin.debug:
        msg: "Production hosts: {{ query('ansible.builtin.inventory_hostnames', 'all') }}"


# ════════════════════════════════════════════════════════════════════════════
# PLAY 7: uri module — calling REST APIs
# ════════════════════════════════════════════════════════════════════════════
- name: Interact with REST APIs
  hosts: localhost
  gather_facts: false

  tasks:
    # GET request
    - name: Check application health endpoint
      ansible.builtin.uri:
        url: "https://httpbin.org/get"
        method: GET
        return_content: true
        timeout: 10
        status_code: 200
      register: health_response
      failed_when: health_response.status != 200
      changed_when: false

    - name: Parse JSON response
      ansible.builtin.debug:
        msg: "Response origin: {{ (health_response.content | from_json).origin }}"

    # POST request (example: Slack/Teams notification)
    - name: Send deployment notification (example)
      ansible.builtin.uri:
        url: "{{ slack_webhook_url | default('https://httpbin.org/post') }}"
        method: POST
        body_format: json
        body:
          text: "Deployment {{ deploy_version | default('unknown') }} completed on {{ inventory_hostname }}"
          username: "Ansible Bot"
        headers:
          Content-Type: "application/json"
        status_code: [200, 204]
      changed_when: true
      when: slack_webhook_url is defined

    # wait_for: block until a condition is met.
    - name: Wait for application to respond
      ansible.builtin.wait_for:
        host: localhost
        port: 8080
        timeout: 60          # wait up to 60 seconds
        delay: 5             # wait 5 seconds before the first check
        state: started       # wait for the port to open (stopped = wait for close)
      tags: [never, example]   # example — skipped by default


# ════════════════════════════════════════════════════════════════════════════
# PLAY 8: raw + script — operating on hosts without Python
# ════════════════════════════════════════════════════════════════════════════
- name: Bootstrap hosts without Python
  hosts: all
  gather_facts: false   # Python isn't installed yet, so no gather_facts

  tasks:
    # raw: send a command over SSH directly, without relying on Python.
    # Use case: initial bootstrap before Python is installed on the target.
    - name: Install Python3 via raw (no Python required)
      ansible.builtin.raw: |
        test -e /usr/bin/python3 || (apt-get update -qq && apt-get install -y python3)
      register: raw_result
      changed_when: "'0 upgraded, 0 newly installed' not in raw_result.stdout"

    # script: copy a script from the control node to the target and execute it.
    # Difference from shell: script uploads the file automatically, so it does not
    # need to exist on the target beforehand.
    - name: Run bootstrap script from control machine
      ansible.builtin.script:
        cmd: "../scripts/bootstrap.sh --env {{ env | default('production') }}"
        creates: /etc/ansible-bootstrapped    # skip if this file exists (idempotent)
      tags: [never, example]   # example — skipped by default


# ════════════════════════════════════════════════════════════════════════════
# PLAY 9: include_role vs import_role — dynamic vs static role inclusion
# ════════════════════════════════════════════════════════════════════════════
- name: Dynamic vs static role inclusion
  hosts: all
  gather_facts: true

  tasks:
    # import_role: static; resolved at compile time; tags propagate.
    - name: Apply common role (static import)
      ansible.builtin.import_role:
        name: common
      tags: [common]

    # include_role: dynamic; resolved at runtime; supports conditions and loops.
    - name: Apply platform-specific role dynamically
      ansible.builtin.include_role:
        name: "platform_{{ ansible_os_family | lower }}"
      tags: [never, example]   # example — skipped by default

    # include_role with vars: override role variables for this call only.
    - name: Apply webserver role with custom vars
      ansible.builtin.include_role:
        name: webserver
      vars:
        webserver__worker_connections: 2048
        webserver__gzip_enabled: false
      when: "'webservers' in group_names"   # group_names: groups the current host belongs to

    # loop over roles (include_role supports loop; import_role does not).
    - name: Install multiple app components
      ansible.builtin.include_role:
        name: "{{ item.role }}"
      loop:
        - { role: webserver }
        - { role: database }
      loop_control:
        label: "{{ item.role }}"
      tags: [never, example]   # example — skipped by default


# ════════════════════════════════════════════════════════════════════════════
# PLAY 10: advanced Jinja2 patterns
# ════════════════════════════════════════════════════════════════════════════
- name: Advanced Jinja2 patterns
  hosts: localhost
  gather_facts: false

  vars:
    users:
      - { name: alice, role: admin, active: true, score: 95 }
      - { name: bob,  role: user,  active: false, score: 72 }
      - { name: carol, role: admin, active: true, score: 88 }
      - { name: dave, role: user,  active: true, score: 60 }

    app_config:
      base:
        debug: false
        log_level: info
      override:
        debug: true    # overrides base.debug

  tasks:
    # selectattr / rejectattr: filter a list by attribute.
    - name: Filter active users
      ansible.builtin.debug:
        msg:
          # selectattr: keep elements matching the condition
          active_users: "{{ users | selectattr('active', 'equalto', true) | list }}"
          # rejectattr: drop elements matching the condition
          inactive_users: "{{ users | rejectattr('active') | list }}"
          # Chained: active admins
          active_admins: "{{ users | selectattr('active') | selectattr('role', 'equalto', 'admin') | map(attribute='name') | list }}"

    # combine: merge dicts (use recursive=true for deep merge).
    - name: Merge configuration dicts
      ansible.builtin.debug:
        msg: "{{ app_config.base | combine(app_config.override, recursive=true) }}"

    # namespace: accumulate a variable across loop iterations
    # (plain variables assigned inside a loop do not persist to the next iteration).
    - name: Accumulate total score using namespace
      ansible.builtin.set_fact:
        high_scorers: >-
          {{ users | selectattr('score', 'gt', 80) | map(attribute='name') | list }}
        avg_score: >-
          {{ (users | map(attribute='score') | list | sum) / (users | length) }}

    - name: Show accumulated results
      ansible.builtin.debug:
        msg:
          - "High scorers (>80): {{ high_scorers }}"
          - "Average score: {{ avg_score | round(1) }}"

    # Catalog of built-in Jinja2 filters.
    - name: Demonstrate built-in Jinja2 filters
      ansible.builtin.debug:
        msg:
          # Strings
          upper: "{{ 'hello world' | upper }}"
          title: "{{ 'hello world' | title }}"
          replace: "{{ 'foo-bar-baz' | replace('-', '_') }}"
          regex: "{{ '192.168.1.100' | regex_search('(\\d+\\.\\d+\\.\\d+\\.\\d+)') }}"
          # Lists
          sort: "{{ [3, 1, 4, 1, 5, 9] | sort | unique }}"
          flatten: "{{ [[1, 2], [3, [4, 5]]] | flatten }}"
          zip: "{{ ['a', 'b', 'c'] | zip([1, 2, 3]) | list }}"
          # Type conversion
          to_yaml: "{{ {'key': 'value'} | to_nice_yaml }}"
          from_json: "{{ '[1,2,3]' | from_json }}"
          # Encoding / hashing
          b64encode: "{{ 'hello' | b64encode }}"
          b64decode: "{{ 'aGVsbG8=' | b64decode }}"
          hash: "{{ 'password123' | hash('sha256') }}"
          # Conditional
          ternary: "{{ true | ternary('yes!', 'no') }}"
          default_if_false: "{{ '' | default('fallback', true) }}"
          mandatory: "{{ 'required_value' | mandatory }}"

    # json_query (requires jmespath): query deeply nested data.
    - name: Extract admin names with json_query
      ansible.builtin.debug:
        # JMESPath syntax: [?role=='admin'].name
        msg: "Admins: {{ users | community.general.json_query('[?role==`admin`].name') }}"
