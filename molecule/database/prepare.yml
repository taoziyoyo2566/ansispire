---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Ubuntu | Update apt and install minimal dependencies
      ansible.builtin.raw: |
        apt-get update && \
        DEBIAN_FRONTEND=noninteractive apt-get install -y tzdata ca-certificates sudo
      register: apt_prep
      failed_when: false
      changed_when: false

    - name: Rocky | Refresh dnf cache and install minimal dependencies
      ansible.builtin.raw: |
        dnf makecache && \
        dnf install -y sudo tzdata
      register: dnf_prep
      failed_when: false
      changed_when: false

    # Debian 12 ships MariaDB by default. The database role hardcodes the
    # `mysql-server` package name, so we add MySQL's upstream APT repo here
    # to keep the role's install task family-blind. Ubuntu 22.04 has
    # `mysql-server` in main, so this task is a no-op there.
    - name: Debian 12 | Add MySQL upstream APT repository
      ansible.builtin.raw: |
        set -e
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y curl gnupg
        curl -fsSL https://repo.mysql.com/RPM-GPG-KEY-mysql-2023 \
          | gpg --dearmor -o /usr/share/keyrings/mysql-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/mysql-archive-keyring.gpg] http://repo.mysql.com/apt/debian/ bookworm mysql-8.0" \
          > /etc/apt/sources.list.d/mysql.list
        apt-get update
      when: inventory_hostname == 'debian12-database'
      changed_when: false
