---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: ubuntu22-database
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

  - name: debian12-database
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

provisioner:
  name: ansible
  env:
    ANSIBLE_CONFIG: "${MOLECULE_PROJECT_DIRECTORY}/ansible.cfg"
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles:${HOME}/.ansible/roles"
    ANSIBLE_FILTER_PLUGINS: "../../filter_plugins"
    ANSIBLE_LOOKUP_PLUGINS: "../../lookup_plugins"
    ANSIBLE_CALLBACK_PLUGINS: "../../callback_plugins"
    ANSIBLE_COLLECTIONS_PATH_WARNINGS: "False"
    ANSIBLE_COLLECTIONS_SCAN_SYS_PATH: "True"
    ANSIBLE_LOCALHOST_WARNING: "False"
    ANSIBLE_DISPLAY_SKIPPED_HOSTS: "False"
  playbooks:
    prepare: prepare.yml
  inventory:
    host_vars:
      ubuntu22-database:
        db_role: primary
      debian12-database:
        db_role: primary
    group_vars:
      all:
        env: testing
        system_timezone: UTC
        ansible_managed: "Ansible managed: modified on %Y-%m-%d %H:%M:%S"
        common_auto_provision_targets: true
        common_packages: [curl]
        common__extra_packages: []
        common__deploy_users: []
        common__motd_enabled: false
        common__sysctl_settings: {}
        app_base_dir: /opt/apps
        app_user: appuser
        app_group: appgroup
        ssh_allowed_users: [root]
        ssh_permit_root_login: "yes"
        ssh_password_auth: "yes"
        firewall_allowed_tcp_ports: [22, 3306]
        database__mysql_root_password: "TestRootPass123!"
        database__mysql_bind_address: "127.0.0.1"
        database__mysql_innodb_buffer_pool_size: "128M"
        database__mysql_max_connections: 50
        database__databases:
          - name: testdb
            encoding: utf8mb4
        database__users:
          - name: testuser
            password: "TestUserPass456!"
            priv: "testdb.*:ALL"
            host: "localhost"
        database__backup_enabled: false

verifier:
  name: ansible
