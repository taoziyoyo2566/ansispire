# molecule/webserver/molecule.yml — Molecule 测试配置
# 安装: pip install molecule molecule-docker
# 运行: molecule test -s webserver

---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker                     # 也支持 vagrant、ec2、gce 等

platforms:
  - name: ubuntu22-webserver
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

  - name: ubuntu20-webserver
    image: geerlingguy/docker-ubuntu2004-ansible:latest
    pre_build_image: true
    privileged: true

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        env: testing
        system_timezone: UTC
        common_packages: [curl, vim]
        app_base_dir: /opt/apps
        app_user: appuser
        app_group: appgroup
        ssh_allowed_users: [root]
        firewall_allowed_tcp_ports: [22, 80, 443]
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible               # 也可以用 testinfra（Python）

lint: |
  set -e
  ansible-lint
