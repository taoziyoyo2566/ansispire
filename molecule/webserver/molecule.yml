# molecule/webserver/molecule.yml — Molecule test configuration
# Install: pip install molecule molecule-docker
# Run:     molecule test -s webserver

---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker                     # vagrant, ec2, gce, etc. are also supported

platforms:
  - name: ubuntu22-webserver
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

  - name: debian12-webserver
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

provisioner:
  name: ansible
  env:
    ANSIBLE_FILTER_PLUGINS: "../../filter_plugins"
    ANSIBLE_LOOKUP_PLUGINS: "../../lookup_plugins"
    ANSIBLE_CALLBACK_PLUGINS: "../../callback_plugins"
    ANSIBLE_COLLECTIONS_PATH_WARNINGS: "False"
    ANSIBLE_COLLECTIONS_SCAN_SYS_PATH: "True"
    ANSIBLE_LOCALHOST_WARNING: "False"
    ANSIBLE_DISPLAY_SKIPPED_HOSTS: "False"
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  inventory:
    group_vars:
      all:
        env: testing
        system_timezone: UTC
        ansible_managed: "Ansible managed: modified on %Y-%m-%d %H:%M:%S"
        common_auto_provision_targets: true
        common_packages: [curl, vim]
        app_base_dir: /opt/apps
        app_user: appuser
        app_group: appgroup
        webserver__vhosts:
          - name: test.local
            root: /var/www/html
            ssl: false
            php_fpm: false
        ssh_allowed_users: [root]
        firewall_allowed_tcp_ports: [22, 80, 443]

verifier:
  name: ansible               # testinfra (Python) is also an option

lint: |
  set -e
  ansible-lint
