---
# molecule/common/verify.yml
- name: Verify common role
  hosts: all
  gather_facts: true
  tasks:
    - name: Verify timezone is UTC
      ansible.builtin.assert:
        that: ansible_date_time.tz == 'UTC'

    - name: Gather installed package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert curl is installed
      ansible.builtin.assert:
        that: "'curl' in ansible_facts.packages"

    - name: Assert UFW is installed on Debian family
      ansible.builtin.assert:
        that:
          - "'ufw' in ansible_facts.packages"
        fail_msg: "Expected ufw package on Debian family hosts"
      when:
        - ansible_os_family == 'Debian'
        - common_ufw_enabled | default(true)

    - name: Verify MOTD deployed
      ansible.builtin.stat:
        path: /etc/motd
      register: motd_stat

    - name: Assert MOTD exists
      ansible.builtin.assert:
        that: motd_stat.stat.exists

    - name: Verify MOTD content is Ansible-managed
      ansible.builtin.command: grep "Ansible" /etc/motd
      changed_when: false

    - name: Verify app base directory exists
      ansible.builtin.stat:
        path: "{{ app_base_dir | default('/opt/apps') }}"
      register: app_dir_stat

    - name: Assert app directory created
      ansible.builtin.assert:
        that: app_dir_stat.stat.exists and app_dir_stat.stat.isdir

    - name: Verify app user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ app_user | default('appuser') }}"
