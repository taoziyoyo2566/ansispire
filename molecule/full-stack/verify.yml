# molecule/full-stack/verify.yml
#
# Verify the core state of all three roles, focusing on service co-existence:
#   - common:    users, directories, MOTD, firewall
#   - webserver: Nginx running, vhost config, HTTP response
#   - database:  MySQL running, port listening, databases exist

---
- name: Verify — Full Stack Integration
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # ── common role checks ─────────────────────────────────────────────────
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert timezone is UTC
      ansible.builtin.assert:
        that:
          - ansible_date_time.tz in ['UTC', 'Etc/UTC']
        fail_msg: "Expected UTC timezone, got {{ ansible_date_time.tz }}"

    - name: Assert curl is installed
      ansible.builtin.assert:
        that: "'curl' in ansible_facts.packages"
        fail_msg: "curl package not found"

    - name: Assert app user exists
      ansible.builtin.getent:
        database: passwd
        key: appuser

    - name: Assert app directory exists
      ansible.builtin.stat:
        path: /opt/apps
      register: app_dir_stat

    - name: Assert app directory is a directory
      ansible.builtin.assert:
        that:
          - app_dir_stat.stat.exists
          - app_dir_stat.stat.isdir

    # ── webserver role checks ──────────────────────────────────────────────
    - name: Assert nginx package is installed
      ansible.builtin.assert:
        that: "'nginx' in ansible_facts.packages"
        fail_msg: "nginx package not found"

    - name: Assert nginx service is running
      ansible.builtin.assert:
        that:
          - "'nginx.service' in services"
          - "services['nginx.service'].state == 'running'"
        fail_msg: "nginx service is not running"

    - name: Verify nginx config syntax
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Assert vhost config file exists
      ansible.builtin.stat:
        path: /etc/nginx/sites-available/fullstack-test.local.conf
      register: vhost_conf

    - name: Assert vhost config is present
      ansible.builtin.assert:
        that: vhost_conf.stat.exists
        fail_msg: "vhost config not found"

    - name: Verify nginx responds on port 80
      ansible.builtin.uri:
        url: http://localhost:80
        status_code: [200, 301, 302, 404]
        timeout: 5
      register: nginx_response

    - name: Assert nginx returned a response
      ansible.builtin.assert:
        that: nginx_response.status in [200, 301, 302, 404]
        fail_msg: "nginx did not respond on port 80 (got {{ nginx_response.status }})"

    # ── database role checks ───────────────────────────────────────────────
    - name: Assert mysql package is installed
      ansible.builtin.assert:
        that: >
          'mysql-server' in ansible_facts.packages or
          'mysql-server-8.0' in ansible_facts.packages
        fail_msg: "mysql-server package not found"

    - name: Assert mysql service is running
      ansible.builtin.assert:
        that:
          - "'mysql.service' in services"
          - "services['mysql.service'].state == 'running'"
        fail_msg: "mysql service is not running"

    - name: Verify MySQL is listening on port 3306
      ansible.builtin.wait_for:
        port: 3306
        host: 127.0.0.1
        timeout: 5
        state: started
      register: mysql_port

    - name: Verify my.cnf is Ansible-managed
      ansible.builtin.command: grep -q "Ansible managed" /etc/mysql/my.cnf
      changed_when: false
      failed_when: false
      register: mycnf_check

    # ── Service co-existence check: both services running simultaneously ───
    - name: Assert nginx AND mysql are both running simultaneously
      ansible.builtin.assert:
        that:
          - services['nginx.service'].state == 'running'
          - services['mysql.service'].state == 'running'
        fail_msg: >
          Service co-existence check failed:
          nginx={{ services['nginx.service'].state }},
          mysql={{ services['mysql.service'].state }}

    - name: Print integration test summary
      ansible.builtin.debug:
        msg:
          - "=== Full-stack Integration Test PASSED ==="
          - "common:    timezone={{ ansible_date_time.tz }}, user=appuser OK"
          - "webserver: nginx={{ services['nginx.service'].state }}, port=80 OK"
          - "database:  mysql={{ services['mysql.service'].state }}, port=3306 OK"
