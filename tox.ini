# tox.ini — tox-ansible integration configuration
#
# tox-ansible auto-discovers Molecule scenarios under molecule/ and supports a
# multi-Ansible-version matrix.
#
# Install:  pip install tox tox-ansible
# Run all:  tox
# Run one:  tox -e molecule-common
# List:     tox list
# Docs:     https://github.com/ansible/tox-ansible

[tox]
min_version = 4.0
env_list =
    lint
    molecule-{common,webserver,database,full-stack}

[testenv]
package = skip

# ── Lint environment ─────────────────────────────────────────────────────────
[testenv:lint]
description = Run yamllint and ansible-lint
deps =
    yamllint>=1.35
    ansible-lint>=25.0
commands =
    yamllint .
    ansible-lint --profile production

# ── Molecule test environment (shared base for all scenarios) ────────────────
[testenv:molecule-{common,webserver,database,full-stack}]
description = Run Molecule scenario: {env_name}
deps =
    ansible-core>=2.16
    molecule>=24.9
    molecule-plugins[docker]>=23.5
    docker>=7.0
    jmespath>=1.0
    netaddr>=0.10
    pymysql>=1.1
    boto3>=1.28
passenv =
    DOCKER_HOST
    DOCKER_TLS_VERIFY
    DOCKER_CERT_PATH
    ANSIBLE_FORCE_COLOR
    PY_COLORS
    ANSIBLE_HOST_KEY_CHECKING
setenv =
    ANSIBLE_FORCE_COLOR = 1
    PY_COLORS = 1
    ANSIBLE_HOST_KEY_CHECKING = False
commands_pre =
    ansible-galaxy role install -r requirements.yml --force
    ansible-galaxy collection install -r requirements.yml --force
commands =
    # env_name format: molecule-common → scenario = common
    molecule test -s {[scenario_map_{env_name}]name}

# Scenario name mapping (tox env name → molecule scenario name)
[scenario_map_molecule-common]
name = common

[scenario_map_molecule-webserver]
name = webserver

[scenario_map_molecule-database]
name = database

[scenario_map_molecule-full-stack]
name = full-stack
