# .pre-commit-config.yaml — 提交前自动检查
# 安装: pip install pre-commit && pre-commit install
# 手动运行: pre-commit run --all-files
# 文档: https://pre-commit.com

---
repos:
  # ── YAML 格式检查 ──────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint]

  # ── Ansible Lint ───────────────────────────────────────────────────────────
  - repo: https://github.com/ansible/ansible-lint
    rev: v24.9.2
    hooks:
      - id: ansible-lint
        # 仅在以下文件变化时触发
        files: \.(yaml|yml)$

  # ── 通用文件检查 ───────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace      # 去除行尾空格
      - id: end-of-file-fixer        # 确保文件末尾有换行
      - id: check-yaml               # YAML 语法检查
      - id: check-json               # JSON 语法检查
      - id: check-merge-conflict     # 检测未解决的 merge 冲突
      - id: detect-private-key       # 检测误提交的私钥
      - id: no-commit-to-branch      # 禁止直接提交到 main/master
        args: [--branch, main, --branch, master]

  # ── Secret 扫描（防止密码泄露）────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: group_vars/all/vault.yml   # vault 文件已加密，排除误报

  # ── Shell 脚本检查 ────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.(sh|bash)$
