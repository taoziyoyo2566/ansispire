# .pre-commit-config.yaml
# Install:     pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

---
repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint]

  - repo: https://github.com/ansible/ansible-lint
    rev: v24.9.2
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        # exclude examples/ (teaching material; lint is not enforced here)
        exclude: ^examples/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        # exclude known placeholder and encrypted files
        exclude: |
          (?x)^(
            inventory/production/group_vars/all/vault\.yml|
            inventory/production/group_vars/all/vault\.example\.yml
          )$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.(sh|bash)$
