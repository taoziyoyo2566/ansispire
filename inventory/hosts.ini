# inventory/hosts.ini — physical topology of the Ansispire fleet.
#
# This is the SSOT for "what hosts exist and what role do they play". The
# environment overlays (inventory/{dev,stag,prod}/hosts.ini) layer
# webservers / dbservers grouping ON TOP of these physical hosts; for the
# control-plane (hub) topology, this is the only file you edit.
#
# Group taxonomy:
#   [hub_local]    — management nodes that run on this workstation (local)
#   [hub_remote]   — management nodes on remote VPS (SSH config alias)
#   [hub:children] = hub_local + hub_remote
#                  → "everything that hosts a Semaphore + audit stack"
#
#   [targets_*]    — managed VPS by OS family (next stage: 4 new VPS for
#                    Alpine / Rocky / Ubuntu / Debian baseline tests). Empty
#                    for now; placeholders kept so the convention is locked.
#   [targets:children] = targets_debian + targets_rhel + targets_alpine
#                  → "hosts that receive infra_baseline only, no hub"
#
# Switching scenarios is just a --limit flag — see Makefile `hub-deploy`:
#   make hub-deploy HUB_NODE=local    → ansible --limit hub_local
#   make hub-deploy HUB_NODE=remote   → ansible --limit hub_remote
#   make hub-deploy HUB_NODE=all      → no --limit (covers both)

# ── Management nodes (host the Semaphore + audit control plane) ──────────
[hub_local]
control_node ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[hub_remote]
ans-hk01 ansible_python_interpreter=/usr/bin/python3.13

[hub:children]
hub_local
hub_remote

# ── Managed targets, classified by OS family ────────────────────────────
# Each managed VPS goes in exactly one targets_* group. Common SSH +
# Python settings live under [targets:vars] below.
#
# Steady state (post TASK-007 WU-B 2026-05-19): all 4 hosts baselined; the
# `ansible` user with NOPASSWD sudo exists on each; SSH key matches root's
# authorized_keys (copied by the role's "Set authorized key" task).
# Connection uses ansible_user=ansible + become: true for any privileged step.

[targets_debian]
d13 ansible_host=89.185.26.211
u24 ansible_host=82.152.164.147

[targets_rhel]
rocky9 ansible_host=82.152.164.153
alma9 ansible_host=82.152.164.144

[targets_alpine]
# (no Alpine host yet — TASK-007.B placeholder; alpine.yml stub stays as fail)

[targets:children]
targets_debian
targets_rhel
targets_alpine

[targets:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/ansible
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new

# ── Legacy: kept for backward-compat with playbooks/site.yml's webservers/
#    dbservers references. Deprecated; new hosts should go in [targets_*]. ─
[webservers]
# ans-hk02

[dbservers]
