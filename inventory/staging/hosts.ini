# inventory/staging/hosts.ini — staging environment inventory

[webservers]
staging-web01.example.com  ansible_host=192.168.10.11

[dbservers]
staging-db01.example.com   ansible_host=192.168.10.21

[staging:children]
webservers
dbservers

[staging:vars]
env=staging
ansible_user=vagrant
ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key
