# inventory/production/hosts.ini — static inventory
# Tip: for production, YAML (hosts.yml) is recommended; .ini is more intuitive for beginners

# ── Standalone hosts ─────────────────────────────────────────────────────────
[webservers]
web01.example.com   ansible_host=10.0.1.11
web02.example.com   ansible_host=10.0.1.12
web03.example.com   ansible_host=10.0.1.13

[dbservers]
db01.example.com    ansible_host=10.0.2.11  db_role=primary
db02.example.com    ansible_host=10.0.2.12  db_role=replica
db03.example.com    ansible_host=10.0.2.13  db_role=replica

[monitoring]
mon01.example.com   ansible_host=10.0.3.11

# ── Group of groups (nested grouping) ────────────────────────────────────────
[production:children]
webservers
dbservers
monitoring

# ── Group-level vars (prefer group_vars/ in practice; inline here for example) ──
[webservers:vars]
nginx_worker_processes=auto

[production:vars]
env=production
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/deploy_rsa
