# host_vars/web01.example.com/vars.yml
# Host-level variables (higher precedence than group_vars).
# Applies only to web01.example.com.

---
# web01 is the primary LB node and also handles Let's Encrypt cert issuance
certbot_primary_node: true

# Host-specific extra vhosts (extend group_vars when it falls short)
nginx_extra_vhosts:
  - name: admin.example.com
    root: /var/www/admin
    ssl: true
    allowed_ips:
      - 10.0.0.0/8
      - 192.168.1.0/24

# Override group-level variables — this host has more memory, raise concurrency
nginx_worker_connections: 4096
