# secrets_external.example.yml — external secret-manager integration example
#
# By default this project uses ansible-vault for secrets (see vault.yml + vault.example.yml).
# When an enterprise-grade secret manager is required, the patterns below can replace
# the static secrets in vault.yml.
#
# Migration paths (pick one based on needs):
#   1. HashiCorp Vault       — self-hosted/managed, dynamic rotation, fine-grained ACLs
#   2. AWS Secrets Manager   — AWS-native, IAM-based access, automatic rotation
#   3. Azure Key Vault       — Azure-native, RBAC, HSM-backed
#
# Steps:
#   1. Install the corresponding Ansible collection (see commented entries in requirements.yml)
#   2. Copy this file to secrets_external.yml
#   3. Uncomment the variable definitions for the chosen backend
#   4. In vars.yml, replace references to vault.yml with references to variables in this file
#   5. Validate: ansible-playbook playbooks/vault_demo.yml --check
#
# Note: external secret managers require network access at runtime — make sure the
# controller host has reachability and credentials.

---
# ── Option 1: HashiCorp Vault ────────────────────────────────────────────────
# Prerequisite: community.hashi_vault collection installed
# Auth: AppRole or Token is recommended (env vars VAULT_ADDR / VAULT_TOKEN)
#
# db_root_password: >-
#   {{ lookup('community.hashi_vault.hashi_vault',
#       'secret/data/ansible-demo/database:root_password',
#       url='https://vault.example.com:8200',
#       auth_method='token') }}
#
# db_app_password: >-
#   {{ lookup('community.hashi_vault.hashi_vault',
#       'secret/data/ansible-demo/database:app_password',
#       url='https://vault.example.com:8200',
#       auth_method='token') }}
#
# api_secret_key: >-
#   {{ lookup('community.hashi_vault.hashi_vault',
#       'secret/data/ansible-demo/app:api_secret_key',
#       url='https://vault.example.com:8200',
#       auth_method='token') }}

# ── Option 2: AWS Secrets Manager ────────────────────────────────────────────
# Prerequisite: amazon.aws collection installed; controller has IAM permissions
# Auth: AWS CLI configuration or IAM Role (EC2 instance profile recommended)
#
# db_root_password: >-
#   {{ lookup('amazon.aws.aws_secret',
#       'ansible-demo/database/root_password',
#       region='us-east-1') }}
#
# db_app_password: >-
#   {{ lookup('amazon.aws.aws_secret',
#       'ansible-demo/database/app_password',
#       region='us-east-1') }}

# ── Option 3: Azure Key Vault ────────────────────────────────────────────────
# Prerequisite: azure.azcollection installed; controller has RBAC permissions
# Auth: Azure CLI login or Managed Identity
#
# db_root_password: >-
#   {{ lookup('azure.azcollection.azure_keyvault_secret',
#       'db-root-password',
#       vault_uri='https://ansible-demo-kv.vault.azure.net') }}
#
# db_app_password: >-
#   {{ lookup('azure.azcollection.azure_keyvault_secret',
#       'db-app-password',
#       vault_uri='https://ansible-demo-kv.vault.azure.net') }}
