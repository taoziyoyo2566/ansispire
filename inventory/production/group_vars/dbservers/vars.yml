# group_vars/dbservers/vars.yml — 仅对 dbservers 组生效

---
# ── MySQL 配置 ────────────────────────────────────────────────────────────────
mysql_version: "8.0"
mysql_port: 3306
mysql_bind_address: "0.0.0.0"
mysql_datadir: /var/lib/mysql

# ── 性能调优 ──────────────────────────────────────────────────────────────────
mysql_innodb_buffer_pool_size: "2G"
mysql_innodb_log_file_size: "256M"
mysql_max_connections: 300
mysql_query_cache_size: 0          # MySQL 8.0 已废弃 query cache

# ── 数据库 & 用户列表 ──────────────────────────────────────────────────────────
mysql_databases:
  - name: appdb
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
  - name: analyticsdb
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci

mysql_users:
  - name: appuser
    password: "{{ vault_db_app_password }}"   # 引用 vault 变量
    priv: "appdb.*:ALL"
    host: "10.0.1.%"                          # 仅允许 webservers 网段
  - name: readonly
    password: "{{ vault_db_app_password }}"
    priv: "appdb.*:SELECT"
    host: "%"

# ── 备份配置 ──────────────────────────────────────────────────────────────────
mysql_backup_enabled: true
mysql_backup_dir: /backups/mysql
mysql_backup_retention_days: 7

# ── 防火墙 ────────────────────────────────────────────────────────────────────
firewall_allowed_tcp_ports:
  - 22
  - 3306
