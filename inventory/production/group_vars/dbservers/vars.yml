# group_vars/dbservers/vars.yml
# 变量命名约定: 统一使用 database__ 前缀，与 roles/database/defaults 一致

---
# ── MySQL 配置（覆盖 roles/database/defaults/main.yml）──────────────────────
database__mysql_version: "8.0"
database__mysql_port: 3306
database__mysql_bind_address: "0.0.0.0"
database__mysql_datadir: /var/lib/mysql

# ── 性能调优（覆盖 role defaults）────────────────────────────────────────────
database__mysql_innodb_buffer_pool_size: "2G"
database__mysql_innodb_log_file_size: "256M"
database__mysql_max_connections: 300

# ── 数据库列表（被 roles/database/tasks/configure.yml 消费）──────────────────
database__databases:
  - name: appdb
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
  - name: analyticsdb
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci

# ── 用户列表 ──────────────────────────────────────────────────────────────────
database__users:
  - name: appuser
    password: "{{ vault_db_app_password }}"
    priv: "appdb.*:ALL"
    host: "10.0.1.%"
  - name: readonly
    password: "{{ vault_db_app_password }}"
    priv: "appdb.*:SELECT"
    host: "%"

# ── 备份 ──────────────────────────────────────────────────────────────────────
database__backup_enabled: true
database__backup_dir: /backups/mysql
database__backup_retention_days: 7

# ── 公共变量 ──────────────────────────────────────────────────────────────────
firewall_allowed_tcp_ports:
  - 22
  - 3306
