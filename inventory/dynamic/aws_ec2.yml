# inventory/dynamic/aws_ec2.yml — AWS EC2 dynamic-inventory plugin config
# Plugin docs: https://docs.ansible.com/ansible/latest/collections/amazon/aws/aws_ec2_inventory.html
# Enable: in ansible.cfg, set inventory = inventory/production:inventory/dynamic
# Prereq: pip install boto3 && ansible-galaxy collection install amazon.aws

---
plugin: amazon.aws.aws_ec2

# ── Regions to scan ──────────────────────────────────────────────────────────
regions:
  - us-east-1
  - ap-southeast-1

# ── Filters (return only instances that match these tags) ───────────────────
filters:
  tag:Environment: production
  instance-state-name: running

# ── Hostname format ──────────────────────────────────────────────────────────
# Options: ip-address / dns-name / tag:Name / private-ip-address
hostnames:
  - tag:Name              # prefer the Name tag as the hostname
  - private-ip-address    # fall back to private IP when Name tag is absent

# ── Auto-grouping ────────────────────────────────────────────────────────────
# keyed_groups: auto-create Ansible groups by EC2 attribute
keyed_groups:
  # Group by tag:Role — Role=webserver → group name role_webserver
  - key: tags.Role
    prefix: role
    separator: "_"

  # Group by instance type — t3.medium → group name type_t3_medium
  - key: instance_type
    prefix: type

  # Group by availability zone — us-east-1a → group name az_us_east_1a
  - key: placement.availability_zone
    prefix: az

# ── Composed filters (conditional groups) ───────────────────────────────────
groups:
  # Instances whose Role tag contains "web" join the webservers group
  webservers: "'web' in tags.Role | default('')"
  # Instances whose Role tag contains "db" join the dbservers group
  dbservers: "'db' in tags.Role | default('')"

# ── Extra variables (extracted from EC2 metadata) ───────────────────────────
compose:
  # Use the private IP as ansible_host
  ansible_host: private_ip_address
  # Read env from a tag
  env: tags.Environment | default('unknown')
  # Read db_role from a tag
  db_role: tags.DBRole | default(omit)
