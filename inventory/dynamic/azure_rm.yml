# Enablement steps:
#   1. Uncomment azure.azcollection in requirements.yml
#   2. Run: ansible-galaxy collection install azure.azcollection
#   3. Install Python deps: pip install azure-mgmt-compute azure-mgmt-network azure-identity
#   4. Configure authentication: `az login` or set these env vars:
#      export AZURE_CLIENT_ID=...
#      export AZURE_CLIENT_SECRET=...
#      export AZURE_TENANT_ID=...
#      export AZURE_SUBSCRIPTION_ID=...
#   5. Update ansible.cfg:
#      inventory = inventory/production:inventory/dynamic
