# inventory/dev/hosts.ini
# Logic: Dev/Test Environment Mapping (Full-stack local test)

[dev:children]
webservers
dbservers

[webservers]
# Target local machine for full-stack dev deployment
localhost ansible_connection=local

[dbservers]
localhost ansible_connection=local

[dev:vars]
env=dev
ansible_python_interpreter=/usr/bin/python3
