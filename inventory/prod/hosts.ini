# inventory/prod/hosts.ini
# Logic: Prod Environment Mapping
#
# This file is a single, self-contained inventory source. Any group referenced
# in [prod:children] MUST be defined here as well — Ansible does not auto-merge
# from inventory/hosts.ini when called as `-i inventory/prod` only.

[prod:children]
hub_management
webservers
dbservers
targets_debian
targets_rhel
targets_alpine

# ── Management Plane (Self-Healing targets) ──────────────────────────
[hub_management]
# In prod, we target the management node via its real SSH alias
# to ensure consistent audit logs and connectivity checks.
ans-hk01

# ── Logical Roles (Application Plane) ────────────────────────────────
[webservers]
ans-hk01

[dbservers]
# Add real DB servers here

# ── OS-family placeholders (TASK-007 round 1 deliberately did NOT
#    populate these here). Reason: site.yml's `hosts: all` play would
#    otherwise sweep the 4 targets on every `make deploy-prod` /
#    Semaphore "site.yml (check mode)" run — broadening prod blast
#    radius beyond the role those hosts actually receive
#    (infra_baseline only). Targets live in the SSOT
#    `inventory/hosts.ini` and are reached via the dedicated
#    `target-deploy` Makefile wrapper + the Semaphore "Ping all
#    targets" template's own inventory entry. ─────────────────────────
[targets_debian]
# debian-vm-1

[targets_rhel]
# rocky-vm-1

[targets_alpine]
# alpine-vm-1

[prod:vars]
env=prod
ansible_python_interpreter=/usr/bin/python3.13
