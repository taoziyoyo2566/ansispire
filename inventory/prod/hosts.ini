# inventory/prod/hosts.ini
# Logic: Prod Environment Mapping
#
# This file is a single, self-contained inventory source. Any group referenced
# in [prod:children] MUST be defined here as well — Ansible does not auto-merge
# from inventory/hosts.ini when called as `-i inventory/prod` only.

[prod:children]
hub_management
webservers
dbservers
targets_debian
targets_rhel
targets_alpine

# ── Management Plane (Self-Healing targets) ──────────────────────────
[hub_management]
# In prod, we target the management node via its real SSH alias
# to ensure consistent audit logs and connectivity checks.
ans-hk01

# ── Logical Roles (Application Plane) ────────────────────────────────
[webservers]
ans-hk01

[dbservers]
# Add real DB servers here

# ── OS-family managed targets (TASK-007, populated 2026-05-19) ───────
# Hosts mirrored from inventory/hosts.ini (the physical SSOT). Prod
# inventory must be self-contained — Ansible does not auto-merge from
# the SSOT when called as `-i inventory/prod` only (e.g. by Semaphore).
# Keep this in lock-step with inventory/hosts.ini [targets_*] blocks.
[targets_debian]
d13 ansible_host=89.185.26.211
u24 ansible_host=82.152.164.147

[targets_rhel]
rocky9 ansible_host=82.152.164.153
alma9 ansible_host=82.152.164.144

[targets_alpine]
# (no Alpine host yet — TASK-007.B placeholder; alpine.yml stub fires)

# Parent group declaration — required for [targets:vars] to bind to a
# defined group. Mirrors inventory/hosts.ini SSOT structure.
[targets:children]
targets_debian
targets_rhel
targets_alpine

# Connection settings for the targets group (mirrors inventory/hosts.ini).
[targets:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/ansible
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new

[prod:vars]
env=prod
ansible_python_interpreter=/usr/bin/python3.13
