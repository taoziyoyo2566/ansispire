---
# Semaphore first-run bootstrap
#
# Purpose:
#   Use the Semaphore REST API to create a minimal working project / repo /
#   inventory / template so that a learner who just logged in can run a job
#   immediately, without having to click through the configuration UI first.
#
# Usage:
#   ansible-playbook controller/semaphore/bootstrap.yml \
#     -e semaphore_url=http://localhost:3000 \
#     -e semaphore_user=admin \
#     -e semaphore_password=<admin-password>
#
# Idempotency:
#   - If a project/repo/inventory/template with the same name already exists,
#     creation is skipped (guarded by failed_when)
#   - Re-running after a successful first run does not produce duplicates
#
# API docs: https://docs.semaphoreui.com/administration-guide/api/

- name: Bootstrap Semaphore with a minimal ansispire project
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    semaphore_url: "http://localhost:3000"
    semaphore_user: "admin"
    # semaphore_password: pass via -e; no default value to avoid accidental use
    project_name: "ansispire"
    repo_name: "local-workspace"
    inventory_name: "production"
    template_name: "site.yml (check mode)"
    # Mount path inside the container
    repo_path_in_container: "/workspace"
    inventory_path_in_repo: "inventory/production/hosts.ini"
    playbook_path_in_repo: "playbooks/site.yml"

  tasks:
    - name: Assert required variables are provided
      ansible.builtin.assert:
        that:
          - semaphore_password is defined
          - semaphore_password | length > 0
        fail_msg: >
          Password must be provided via -e semaphore_password=<admin-password>.
          The password can be read from controller/semaphore/.env.

    - name: Log in to Semaphore and capture session cookie
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/auth/login"
        method: POST
        body_format: json
        body:
          auth: "{{ semaphore_user }}"
          password: "{{ semaphore_password }}"
        status_code: [204, 200]
      register: login_response
      no_log: true

    - name: Extract session cookie
      ansible.builtin.set_fact:
        semaphore_cookie: "{{ login_response.cookies_string }}"
      no_log: true

    - name: List existing projects
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/projects"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: projects_list

    - name: Find matching project by name
      ansible.builtin.set_fact:
        existing_project: "{{ projects_list.json | selectattr('name', 'equalto', project_name) | list | first | default({}) }}"

    - name: Create project if missing - {{ project_name }}
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/projects"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: "{{ project_name }}"
          alert: false
          max_parallel_tasks: 0
        status_code: [201]
        return_content: true
      register: created_project
      when: existing_project == {}

    - name: Resolve project id
      ansible.builtin.set_fact:
        project_id: "{{ (created_project.json.id | default(existing_project.id)) | int }}"

    - name: Ensure local key (empty; used for local workspace mount)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/keys"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: "none"
          type: "none"
          project_id: "{{ project_id | int }}"
        status_code: [201, 204, 400]
      register: key_create
      failed_when: >
        key_create.status not in [201, 204]
        and 'already exists' not in (key_create.content | default(''))

    - name: List keys to find 'none' key id
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/keys"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: keys_list

    - name: Resolve none-key id
      ansible.builtin.set_fact:
        none_key_id: "{{ (keys_list.json | selectattr('name', 'equalto', 'none') | list | first).id }}"

    - name: Create repository pointing to /workspace - {{ repo_name }}
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/repositories"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: "{{ repo_name }}"
          project_id: "{{ project_id | int }}"
          git_url: "{{ repo_path_in_container }}"
          git_branch: "master"
          ssh_key_id: "{{ none_key_id | int }}"
        status_code: [201, 204, 400]
      register: repo_create
      failed_when: >
        repo_create.status not in [201, 204]
        and 'already exists' not in (repo_create.content | default(''))

    - name: List repositories
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/repositories"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: repos_list

    - name: Resolve repo id
      ansible.builtin.set_fact:
        repo_id: "{{ (repos_list.json | selectattr('name', 'equalto', repo_name) | list | first).id }}"

    - name: Create inventory '{{ inventory_name }}'
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/inventory"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: "{{ inventory_name }}"
          project_id: "{{ project_id | int }}"
          inventory: "{{ inventory_path_in_repo }}"
          type: "file"
          ssh_key_id: "{{ none_key_id | int }}"
        status_code: [201, 204, 400]
      register: inv_create
      failed_when: >
        inv_create.status not in [201, 204]
        and 'already exists' not in (inv_create.content | default(''))

    - name: List inventories
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/inventory"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: invs_list

    - name: Resolve inventory id
      ansible.builtin.set_fact:
        inventory_id: "{{ (invs_list.json | selectattr('name', 'equalto', inventory_name) | list | first).id }}"

    - name: Create empty environment (no extra vars)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/environment"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: "default"
          project_id: "{{ project_id | int }}"
          json: "{}"
        status_code: [201, 204, 400]
      register: env_create
      failed_when: >
        env_create.status not in [201, 204]
        and 'already exists' not in (env_create.content | default(''))

    - name: List environments
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/environment"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: envs_list

    - name: Resolve environment id
      ansible.builtin.set_fact:
        environment_id: "{{ (envs_list.json | selectattr('name', 'equalto', 'default') | list | first).id }}"

    - name: Create job template (dry-run) - {{ template_name }}
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ project_id }}/templates"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          project_id: "{{ project_id | int }}"
          inventory_id: "{{ inventory_id | int }}"
          repository_id: "{{ repo_id | int }}"
          environment_id: "{{ environment_id | int }}"
          name: "{{ template_name }}"
          playbook: "{{ playbook_path_in_repo }}"
          arguments: '["--check", "--diff"]'
          allow_override_args_in_task: false
          description: "Round 7 bootstrap: runs site.yml in check mode"
          app: "ansible"
        status_code: [201, 204, 400]
      register: tpl_create
      failed_when: >
        tpl_create.status not in [201, 204]
        and 'already exists' not in (tpl_create.content | default(''))

    # ═══════════════════════════════════════════════════════════════════
    # Round 8: RBAC demo — users, demo project, role bindings, credentials
    # ═══════════════════════════════════════════════════════════════════
    # Scope adjustment from plan §3: Semaphore OSS v2.10 has no /api/teams
    # endpoint. "Team" is a conceptual grouping in role-matrix.md; users
    # bind directly to the demo project with their role. See
    # controller/rbac/role-matrix.md for the full semantics.

    - name: Ensure controller/rbac directory exists on control host
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../rbac"
        state: directory
        mode: "0700"

    # lookup('password', ...) persists to the given path, so this is
    # idempotent across runs — subsequent runs read the same passwords.
    - name: Generate (or read) random passwords for the 3 demo users
      ansible.builtin.set_fact:
        demo_users:
          - username: demo_platform
            name: "Demo — Platform (owner)"
            email: demo_platform@localhost
            role: owner
            password: "{{ lookup('ansible.builtin.password',
              playbook_dir + '/../rbac/.demo_platform.pw length=24 chars=ascii_letters,digits') }}"
          - username: demo_dev
            name: "Demo — Dev (task_runner)"
            email: demo_dev@localhost
            role: task_runner
            password: "{{ lookup('ansible.builtin.password',
              playbook_dir + '/../rbac/.demo_dev.pw length=24 chars=ascii_letters,digits') }}"
          - username: demo_audit
            name: "Demo — Audit (guest)"
            email: demo_audit@localhost
            role: guest
            password: "{{ lookup('ansible.builtin.password',
              playbook_dir + '/../rbac/.demo_audit.pw length=24 chars=ascii_letters,digits') }}"
      no_log: true

    - name: Persist demo-user credentials to gitignored users.yml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../rbac/users.yml"
        mode: "0600"
        content: |
          # controller/rbac/users.yml — Round 8 demo-user credentials
          # Generated by controller/semaphore/bootstrap.yml
          # GITIGNORED — do not commit
          ---
          {% for u in demo_users %}
          - username: {{ u.username }}
            name: "{{ u.name }}"
            email: {{ u.email }}
            role: {{ u.role }}
            password: "{{ u.password }}"
          {% endfor %}
      no_log: true

    - name: List existing global users
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/users"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: users_list

    - name: Create demo users (idempotent)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/users"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: "{{ item.name }}"
          username: "{{ item.username }}"
          email: "{{ item.email }}"
          password: "{{ item.password }}"
          alert: false
          admin: false
        status_code: [201, 400]
      loop: "{{ demo_users }}"
      loop_control:
        label: "{{ item.username }}"
      when: (users_list.json | selectattr('username', 'equalto', item.username) | list | length) == 0
      register: user_create
      failed_when: >
        user_create.results is defined and
        user_create.results | selectattr('status', 'defined') | selectattr('status', 'eq', 400) | list | length > 0 and
        'already exists' not in (user_create.results | map(attribute='content') | default([]) | join(' '))
      no_log: true

    - name: Re-list users to resolve IDs
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/users"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: users_list_after

    - name: Build username → id map
      ansible.builtin.set_fact:
        user_id_map: >-
          {{ dict(users_list_after.json | map(attribute='username')
                  | zip(users_list_after.json | map(attribute='id'))) }}

    - name: Create round8-rbac-demo project (idempotent)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/projects"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: round8-rbac-demo
          alert: false
          max_parallel_tasks: 0
        status_code: [201]
        return_content: true
      register: demo_project_create
      when: (projects_list.json | selectattr('name', 'equalto', 'round8-rbac-demo') | list | length) == 0

    - name: Re-list projects to resolve demo project id
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/projects"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: projects_list_after

    - name: Resolve demo project id
      ansible.builtin.set_fact:
        demo_project_id: >-
          {{ (projects_list_after.json
              | selectattr('name', 'equalto', 'round8-rbac-demo')
              | list | first).id | int }}

    - name: Bind each demo user to the demo project with their role
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ demo_project_id }}/users"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          user_id: "{{ user_id_map[item.username] | int }}"
          project_id: "{{ demo_project_id | int }}"
          role: "{{ item.role }}"
        status_code: [201, 204, 400, 409]
      loop: "{{ demo_users }}"
      loop_control:
        label: "{{ item.username }} → {{ item.role }}"
      register: bind_result
      failed_when: >
        bind_result.results is defined and
        (bind_result.results | selectattr('status', 'defined')
         | rejectattr('status', 'in', [201, 204, 400, 409])
         | list | length) > 0

    # ── Credentials: SSH key placeholder + vault_password placeholder ──
    # D3=b: placeholder only. Real vault password is never imported at
    # bootstrap time; users follow controller/rbac/README.md to import.

    - name: List demo-project keys
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ demo_project_id }}/keys"
        method: GET
        headers:
          Cookie: "{{ semaphore_cookie }}"
        return_content: true
      register: demo_keys_list

    # Semaphore v2.10 rejects an empty private_key with HTTP 400, so we seed
    # an obviously-fake PEM block. Real material is imported via the UI per
    # controller/rbac/README.md; the placeholder is never used for auth.
    - name: Create placeholder SSH key 'ssh_lab_key' (idempotent)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ demo_project_id }}/keys"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: ssh_lab_key
          type: ssh
          project_id: "{{ demo_project_id | int }}"
          ssh:
            login: ""
            passphrase: ""
            private_key: "-----BEGIN OPENSSH PRIVATE KEY-----\nPLACEHOLDER-REPLACE-VIA-UI\n-----END OPENSSH PRIVATE KEY-----\n"
        status_code: [201, 204, 400]
      register: ssh_key_create
      when: (demo_keys_list.json | selectattr('name', 'equalto', 'ssh_lab_key') | list | length) == 0
      failed_when: >
        ssh_key_create.status is defined and
        ssh_key_create.status == 400 and
        'already exists' not in (ssh_key_create.content | default(''))

    - name: Create placeholder login_password 'vault_prod_password' (idempotent)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ demo_project_id }}/keys"
        method: POST
        headers:
          Cookie: "{{ semaphore_cookie }}"
        body_format: json
        body:
          name: vault_prod_password
          type: login_password
          project_id: "{{ demo_project_id | int }}"
          login_password:
            login: "vault"
            # Placeholder — real password imported via UI per rbac/README.md
            password: "REPLACE_ME"
        status_code: [201, 204, 400]
      register: vault_key_create
      when: (demo_keys_list.json | selectattr('name', 'equalto', 'vault_prod_password') | list | length) == 0
      failed_when: >
        vault_key_create.status is defined and
        vault_key_create.status == 400 and
        'already exists' not in (vault_key_create.content | default(''))

    - name: Bootstrap complete
      ansible.builtin.debug:
        msg:
          - "Semaphore bootstrap done."
          - "Project:    {{ project_name }} (id {{ project_id }})"
          - "Repository: {{ repo_name }} → {{ repo_path_in_container }}"
          - "Inventory:  {{ inventory_name }} → {{ inventory_path_in_repo }}"
          - "Template:   {{ template_name }}"
          - "Open {{ semaphore_url }} and trigger '{{ template_name }}' to see it run."
          - ""
          - "── Round 8 RBAC demo ─────────────────────────────"
          - "Demo project: round8-rbac-demo (id {{ demo_project_id }})"
          - "Demo users:   demo_platform (owner), demo_dev (task_runner), demo_audit (guest)"
          - "Credentials:  controller/rbac/users.yml (gitignored)"
          - "Placeholder keys: ssh_lab_key (SSH), vault_prod_password (login_password)"
          - "Import real SSH/vault material via UI — see controller/rbac/README.md"
