# Semaphore control-plane minimal deployment (SQLite backend)
#
# Purpose:      learn Ansible control-plane concepts (project / inventory / template / job)
# Resources:    ~200 MB RAM, single process
# Upgrade path: see controller/README.md
#
# Image + port policy: BOTH come from config/manifest.yml via `make
# manifest-sync` → controller/semaphore/.env. Container side stays at the
# upstream default 3000. The :-fallback in ${VAR:-default} only kicks in
# if .env is missing — normal flow has manifest-sync render real values.
# Bump versions/ports by editing config/manifest.yml then re-running sync.
#
# Start: make controller-up   (or docker compose --env-file .env up -d)
# Stop:  make controller-down
# Logs:  make controller-logs
---
services:
  semaphore:
    image: "semaphoreui/semaphore:${SEMAPHORE_IMAGE_TAG:-latest}"
    container_name: ansispire-semaphore
    restart: unless-stopped
    ports:
      - "${SEMAPHORE_PORT:-3300}:3000"
    environment:
      # Database: SQLite (Recommended for v2.18+, BoltDB is deprecated).
      # SEMAPHORE_DB_PATH is a DIRECTORY in the upstream server-wrapper
      # (it appends database.sqlite). We leave it unset so the upstream
      # default /var/lib/semaphore is used, which matches the volume mount
      # below. Setting it to a file path like .../semaphore.db caused that
      # leaf to be created as a directory instead.
      SEMAPHORE_DB_DIALECT: sqlite

      # Admin account (created on first boot)
      SEMAPHORE_ADMIN: "${SEMAPHORE_ADMIN:-admin}"
      SEMAPHORE_ADMIN_NAME: "${SEMAPHORE_ADMIN_NAME:-Administrator}"
      SEMAPHORE_ADMIN_EMAIL: "${SEMAPHORE_ADMIN_EMAIL:-admin@localhost}"
      SEMAPHORE_ADMIN_PASSWORD: "${SEMAPHORE_ADMIN_PASSWORD:?set in .env}"

      # Web root (change this when served behind a reverse proxy)
      SEMAPHORE_WEB_ROOT: "${SEMAPHORE_WEB_ROOT:-}"

      # Timezone
      TZ: "${TZ:-UTC}"

      # Security keys — see .env.example "Security keys" block. Empty
      # default means "Semaphore mints ephemeral keys each restart":
      # safe for first-run discovery, but a hub deploy MUST persist them
      # via .env (Path A: rendered by ansispire_hub role from
      # state/.security_keys; Path B: user pastes manually).
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: "${SEMAPHORE_ACCESS_KEY_ENCRYPTION:-}"
      SEMAPHORE_COOKIE_HASH: "${SEMAPHORE_COOKIE_HASH:-}"
      SEMAPHORE_COOKIE_ENCRYPTION: "${SEMAPHORE_COOKIE_ENCRYPTION:-}"

      # Ansible-related
      ANSIBLE_HOST_KEY_CHECKING: "False"
    volumes:
      # Control-plane state (database, uploaded vault keys, tmp)
      - semaphore-data:/var/lib/semaphore
      - semaphore-config:/etc/semaphore
      - semaphore-tmp:/tmp/semaphore

      # Writable home for Ansible environment (collections, logs, cache)
      - semaphore-home:/home/semaphore

      # Mount this repo read-only as the project source
      # Note: Semaphore can also git-clone, but bind-mounting makes repo edits
      # immediately visible during learning sessions.
      - ../..:/workspace:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      default: {}
      controller-net:
        aliases: [semaphore]

volumes:
  semaphore-data:
  semaphore-config:
  semaphore-tmp:
  semaphore-home:

networks:
  controller-net:
    external: true
    name: controller-net
