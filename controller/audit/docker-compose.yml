# controller/audit/docker-compose.yml — Round 8 audit sink + Round 9 relay
#
# Purpose:
#   - audit-sink: accept HTTP POSTs and append each event to events.jsonl.
#   - audit-relay (R9): poll Semaphore /api/events and forward new entries
#     to the sink. This closes the control-plane loop: actions taken in
#     Semaphore (logins, template runs, key changes) leave a structured
#     trace in the sink without needing Semaphore-side webhook config.
#
# Network:
#   Both services join the external `controller-net` so the relay can
#   reach Semaphore as `semaphore:3000` and the sink as `audit-sink:3010`.
#   Create it once: `make controller-net` (or `docker network create
#   controller-net`).
#
# Start:  make controller-audit-up
# Stop:   make controller-audit-down
# Tail:   make controller-audit-tail

---
services:
  audit-sink:
    # Local build: bakes logrotate + sink.py into a pinned image, instead
    # of `apk add` at every container start (WU-2.5).
    build:
      context: .
      dockerfile: Dockerfile.sink
    image: "ansispire/audit-sink:${AUDIT_IMAGE_TAG:-3.12-alpine}"
    container_name: ansispire-audit-sink
    restart: unless-stopped
    ports:
      # Bind to loopback only — this is a local learning sink, not public.
      # Host-side default 3310 follows the +300 convention (config/ports.yml
      # is SSOT, propagated to .env by `make ports-sync`).
      - "127.0.0.1:${AUDIT_PORT:-3310}:3010"
    volumes:
      - audit-data:/var/log/semaphore
    environment:
      AUDIT_LOG: /var/log/semaphore/events.jsonl
      AUDIT_PORT: "3010"
      PYTHONUNBUFFERED: "1"
    healthcheck:
      # 127.0.0.1 explicitly — sink binds IPv4-only and wget tries ::1 first.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3010/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      default: {}
      controller-net:
        aliases: [audit-sink]

  # Round 9: polling relay — Semaphore /api/events → audit-sink
  audit-relay:
    # Uses the upstream python base directly (no bake). AUDIT_PYTHON_BASE_TAG
    # is semantically distinct from AUDIT_IMAGE_TAG (which tags our own baked
    # sink/reactor images) — see Round 8 changelog for the disentanglement.
    image: "python:${AUDIT_PYTHON_BASE_TAG:-3.12-alpine}"
    container_name: ansispire-audit-relay
    restart: unless-stopped
    depends_on:
      audit-sink:
        condition: service_healthy
    volumes:
      - ./relay.py:/app/relay.py:ro
      - audit-relay-state:/var/lib/audit-relay
    working_dir: /app
    environment:
      SEMAPHORE_URL: "http://semaphore:3000"
      SEMAPHORE_API_TOKEN: "${SEMAPHORE_API_TOKEN:-}"
      SINK_URL: "http://audit-sink:3010/event"
      STATE_FILE: "/var/lib/audit-relay/cursor.json"
      POLL_INTERVAL: "5"
      PYTHONUNBUFFERED: "1"
    command: ["python3", "/app/relay.py"]
    healthcheck:
      # No HTTP surface — verify the python interpreter is still alive
      # (busybox `pidof` is in the alpine base image, no install needed).
      test: ["CMD-SHELL", "pidof python3 >/dev/null"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - controller-net

  # Phase 4: EDA reactor — Watch events.jsonl → reactions (Webhook/Shell)
  audit-reactor:
    # Local build: bakes jq + reactor.py into a pinned image (WU-2.6).
    build:
      context: .
      dockerfile: Dockerfile.reactor
    image: "ansispire/audit-reactor:${AUDIT_IMAGE_TAG:-3.12-alpine}"
    container_name: ansispire-audit-reactor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      audit-sink:
        condition: service_healthy
    volumes:
      - ../../extensions/eda/rules.json:/etc/ansispire/eda/rules.json:ro
      - ../../extensions/eda/events.schema.json:/etc/ansispire/eda/events.schema.json:ro
      - audit-data:/var/log/semaphore:ro
      # Persists the jsonl read cursor across restarts (WU-2.4) — without
      # this volume the reactor falls back to "tail from EOF" on every boot.
      - audit-reactor-state:/var/lib/audit-reactor
    environment:
      JSONL_PATH: /var/log/semaphore/events.jsonl
      RULES_PATH: /etc/ansispire/eda/rules.json
      EVENTS_SCHEMA_PATH: /etc/ansispire/eda/events.schema.json
      SEMAPHORE_API_TOKEN: "${SEMAPHORE_API_TOKEN:-}"
      EDA_WEBHOOK_URL: "${EDA_WEBHOOK_URL:-}"
      CURSOR_FILE: /var/lib/audit-reactor/cursor
      PYTHONUNBUFFERED: "1"
    healthcheck:
      # Reactor is a tail-loop with no HTTP surface. Inspect PID 1's
      # cmdline directly — `pgrep -f reactor.py` self-matches its own
      # grep argv on some implementations, causing the probe to report
      # healthy even after the reactor process has died.
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q '/app/reactor.py'"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - controller-net

volumes:
  audit-data:
  audit-relay-state:
  audit-reactor-state:

networks:
  controller-net:
    external: true
    name: controller-net
