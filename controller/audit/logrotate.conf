# controller/audit/logrotate.conf — Round 8 audit log rotation (D4=a)
#
# Retention: 7 daily rotations. Each rotated file is gzip-compressed.
# logrotate runs hourly (invoked from the sink container's entrypoint
# wrapper); it only rotates when the file has grown past `size`.

/var/log/semaphore/events.jsonl {
    daily
    rotate 7
    size 10M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
