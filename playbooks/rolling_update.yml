# playbooks/rolling_update.yml — 滚动更新参考模板
#
# ⚠ 这是参考流程模板，不是开箱即用的 playbook。
#   使用前需要替换以下占位变量（通过 group_vars 或 -e 传入）:
#     lb_host     — 负载均衡器主机名（必须存在于 inventory 中）
#     app_repo    — 应用代码仓库 URL
#     app_version — 部署的 git 分支/tag/commit
#
# 展示的 Ansible 模式:
#   serial、max_fail_percentage、delegate_to、run_once、until/retries

---
- name: Rolling update of web servers
  hosts: webservers
  become: true
  gather_facts: true

  vars:
    # 从 inventory 动态取第一台 LB，不存在时 fail 前给出清晰错误
    lb_host: "{{ groups['loadbalancers'] | first | default('') }}"
    app_repo: "https://github.com/YOUR_ORG/YOUR_APP.git"
    app_version: "{{ deploy_version | default('main') }}"

  pre_tasks:
    - name: Assert lb_host is configured
      ansible.builtin.assert:
        that:
          - lb_host | length > 0
          - lb_host in hostvars
        fail_msg: >
          lb_host is not set or not in inventory.
          Add a [loadbalancers] group to your inventory, or pass -e lb_host=<hostname>.
      tags: [lb]

    # 更新前：从负载均衡器摘除该主机
    - name: Remove host from load balancer
      community.general.haproxy:
        state: disabled
        host: "{{ inventory_hostname }}"
        socket: /var/run/haproxy/admin.sock
      delegate_to: "{{ lb_host }}"   # 在 LB 主机上执行
      tags: [lb]

    # 等待连接排空（优雅下线）
    - name: Wait for connections to drain
      ansible.builtin.wait_for:
        timeout: 30
      delegate_to: localhost

  tasks:
    - name: Pull latest app code
      ansible.builtin.git:
        repo: "{{ app_repo }}"
        dest: "{{ app_base_dir }}/myapp"
        version: "{{ app_version }}"
      notify: Restart app service

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_base_dir }}/myapp/requirements.txt"
        virtualenv: "{{ app_base_dir }}/myapp/.venv"

    # run_once + delegate_to: 只在第一台主机执行数据库迁移
    - name: Run database migrations (once per deployment)
      ansible.builtin.command:
        cmd: "{{ app_base_dir }}/myapp/.venv/bin/python manage.py migrate --noinput"
        chdir: "{{ app_base_dir }}/myapp"
      run_once: true
      delegate_to: "{{ groups['webservers'][0] }}"

  handlers:
    - name: Restart app service
      ansible.builtin.systemd:
        name: myapp
        state: restarted

  post_tasks:
    # 等待健康检查通过，再加回 LB
    - name: Wait for app health check
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:{{ app_port | default(8080) }}/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 10
      delay: 5

    - name: Re-add host to load balancer
      community.general.haproxy:
        state: enabled
        host: "{{ inventory_hostname }}"
        socket: /var/run/haproxy/admin.sock
      delegate_to: "{{ lb_host }}"
      tags: [lb]
