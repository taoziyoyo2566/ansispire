# playbooks/rolling_update.yml — rolling-update reference template
#
# ⚠ This is a reference template, not a drop-in-ready playbook.
#   Before use, replace the following placeholders (via group_vars or -e):
#     lb_host     — load balancer hostname (must exist in inventory)
#     app_repo    — application code repository URL
#     app_version — git branch/tag/commit to deploy
#
# Ansible patterns demonstrated:
#   serial, max_fail_percentage, delegate_to, run_once, until/retries

---
- name: Rolling update of web servers
  hosts: webservers
  become: true
  gather_facts: true

  vars:
    # Pick the first LB from inventory; when absent, fail with a clear error.
    lb_host: "{{ groups['loadbalancers'] | first | default('') }}"
    app_repo: "https://github.com/YOUR_ORG/YOUR_APP.git"
    app_version: "{{ deploy_version | default('main') }}"

  pre_tasks:
    - name: Assert lb_host is configured
      ansible.builtin.assert:
        that:
          - lb_host | length > 0
          - lb_host in hostvars
        fail_msg: >
          lb_host is not set or not in inventory.
          Add a [loadbalancers] group to your inventory, or pass -e lb_host=<hostname>.
      tags: [lb]

    # Before update: remove this host from the load balancer
    - name: Remove host from load balancer
      community.general.haproxy:
        state: disabled
        host: "{{ inventory_hostname }}"
        socket: /var/run/haproxy/admin.sock
      delegate_to: "{{ lb_host }}"   # executed on the LB host
      tags: [lb]

    # Wait for connection drain (graceful drain)
    - name: Wait for connections to drain
      ansible.builtin.wait_for:
        timeout: 30
      delegate_to: localhost

  tasks:
    - name: Pull latest app code
      ansible.builtin.git:
        repo: "{{ app_repo }}"
        dest: "{{ app_base_dir }}/myapp"
        version: "{{ app_version }}"
      notify: Restart app service

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_base_dir }}/myapp/requirements.txt"
        virtualenv: "{{ app_base_dir }}/myapp/.venv"

    # run_once + delegate_to: run DB migrations only on the first host
    - name: Run database migrations (once per deployment)
      ansible.builtin.command:
        cmd: "{{ app_base_dir }}/myapp/.venv/bin/python manage.py migrate --noinput"
        chdir: "{{ app_base_dir }}/myapp"
      run_once: true
      delegate_to: "{{ groups['webservers'][0] }}"
      changed_when: true

  handlers:
    - name: Restart app service
      ansible.builtin.systemd:
        name: myapp
        state: restarted

  post_tasks:
    # Wait for the health check to pass before re-adding to the LB
    - name: Wait for app health check
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:{{ app_port | default(8080) }}/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 10
      delay: 5

    - name: Re-add host to load balancer
      community.general.haproxy:
        state: enabled
        host: "{{ inventory_hostname }}"
        socket: /var/run/haproxy/admin.sock
      delegate_to: "{{ lb_host }}"
      tags: [lb]
