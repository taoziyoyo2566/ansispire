# playbooks/site.yml — main playbook
#
# Common invocations:
#   ansible-playbook playbooks/site.yml                           # everything
#   ansible-playbook playbooks/site.yml --tags nginx              # tag filter
#   ansible-playbook playbooks/site.yml --limit webservers        # group filter
#   ansible-playbook playbooks/site.yml --check --diff            # dry-run
#   ansible-playbook playbooks/site.yml -e "env=staging"          # variable override
#   ansible-playbook playbooks/site.yml -i inventory/staging      # switch environment

---
# ── Play 1: baseline config for all hosts ────────────────────────────────────
- name: Apply common baseline to all hosts
  hosts: all
  become: true

  # gather_subset: collect only the facts we need, for speed.
  # min: minimal / hardware: hardware / network: network / virtual: virtualization
  gather_facts: true
  gather_subset:
    - min          # always includes os, python, platform
    - hardware     # needed: ansible_processor_vcpus, ansible_mounts
    - network      # needed: ansible_default_ipv4, ansible_interfaces

  # any_errors_fatal: if any host fails, stop the whole play immediately
  # (do not continue with the rest). Suitable for DB migrations and other
  # operations that cannot tolerate partial success.
  any_errors_fatal: false   # default false; set true for critical operations

  # Ignore unreachable hosts (SSH timeouts, etc.) instead of treating them as failures.
  ignore_unreachable: false

  pre_tasks:
    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600   # skip if updated within the last hour
      when: ansible_os_family == "Debian"
      tags: [packages, always]

  roles:
    - role: common
      tags: [common, base]

  post_tasks:
    - name: Verify timezone configured correctly
      ansible.builtin.assert:
        that:
          - ansible_date_time.tz is defined
        fail_msg: "Timezone check failed"
      tags: [verify]


# ── Play 2: web servers (rolling update) ─────────────────────────────────────
- name: Configure web servers
  hosts: webservers
  become: true
  gather_facts: true

  # serial: rolling-update control
  #   integer 1       → one host at a time
  #   percent "30%"   → 30% of hosts per batch
  #   list [1, 2, 5%] → 1 host first batch, 2 next, then 5% per batch (canary)
  serial: "{{ webserver_serial | default('100%') }}"

  # strategy: task scheduling strategy
  #   linear (default): all hosts advance in lockstep; next task waits until this one finishes everywhere
  #   free:             each host advances independently, no cross-host wait
  strategy: linear

  roles:
    - role: webserver
      tags: [webserver, nginx]


# ── Play 3: database servers ─────────────────────────────────────────────────
- name: Configure database servers
  hosts: dbservers
  become: true
  gather_facts: true
  any_errors_fatal: true    # DB changes must all succeed

  roles:
    - role: database
      tags: [database, mysql]
