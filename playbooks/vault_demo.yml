# playbooks/vault_demo.yml — end-to-end Ansible Vault workflow demo
#
# Vault command cheat-sheet:
#
#   # Encrypt an entire file
#   ansible-vault encrypt inventory/production/group_vars/all/vault.yml
#
#   # Decrypt a file (in place)
#   ansible-vault decrypt inventory/production/group_vars/all/vault.yml
#
#   # View an encrypted file (without writing plaintext to disk)
#   ansible-vault view inventory/production/group_vars/all/vault.yml
#
#   # Edit an encrypted file
#   ansible-vault edit inventory/production/group_vars/all/vault.yml
#
#   # Change the vault password
#   ansible-vault rekey inventory/production/group_vars/all/vault.yml
#
#   # Encrypt a single string (inline, for embedding in vars.yml)
#   ansible-vault encrypt_string 'MySecret123' --name 'db_password'
#   # Output:
#   # db_password: !vault |
#   #   $ANSIBLE_VAULT;1.1;AES256
#   #   66...
#
#   # Supplying the vault password at runtime (three options):
#   ansible-playbook site.yml --ask-vault-pass              # interactive prompt
#   ansible-playbook site.yml --vault-password-file .vault_pass  # password file
#   ansible-playbook site.yml --vault-id prod@.vault_pass   # multi vault-id

---
- name: Vault workflow demonstration
  hosts: localhost
  gather_facts: false

  vars:
    # Plain-text variable referencing a vaulted variable.
    # Best practice: prefix with vault_ to mark the source clearly.
    # vault_db_root_password is defined (encrypted) in inventory/production/group_vars/all/vault.yml
    db_password: "{{ vault_db_root_password }}"
    api_key: "{{ vault_api_secret_key }}"

    # Inline encrypted variable example (normally placed in a vars file, not the playbook)
    # inline_secret: !vault |
    #   $ANSIBLE_VAULT;1.1;AES256
    #   33343637...

  tasks:
    - name: Show that vault variables are accessible (masked in no_log tasks)
      ansible.builtin.debug:
        msg: "DB password length: {{ db_password | length }} chars"

    # no_log: true — hide all output for tasks that touch sensitive variables
    - name: Task using secret (no_log prevents exposure)
      ansible.builtin.command: echo "connecting with password"
      environment:
        DB_PASSWORD: "{{ db_password }}"
      no_log: true
      changed_when: false

    # Multi-vault-id scenario (production + development use different passwords)
    # ansible-playbook site.yml \
    #   --vault-id prod@prod_vault_pass \
    #   --vault-id dev@dev_vault_pass
    - name: Explain multi-vault-id usage
      ansible.builtin.debug:
        msg: |
          Multi-vault-id allows different passwords per environment.
          Each encrypted value carries its vault-id label:
            $ANSIBLE_VAULT;1.2;AES256;prod
          This way staging and prod secrets use separate passwords.
