# requirements.yml — 外部依赖声明
# 安装:
#   ansible-galaxy role install -r requirements.yml
#   ansible-galaxy collection install -r requirements.yml

---
roles:
  # 从 Ansible Galaxy 安装
  - name: geerlingguy.docker
    version: "7.0.0"

  # 占位示例（私有 Git 仓库）— 已注释，make install 时不会安装
  # 取消注释并替换为真实 URL 再使用
  # - name: my_company.base_hardening
  #   src: https://github.com/YOUR_ORG/ansible-hardening.git
  #   version: v2.1.0
  #   scm: git

collections:
  - name: community.general
    version: ">=8.0.0"

  - name: community.mysql
    version: ">=3.0.0"

  - name: ansible.posix
    version: ">=1.5.0"

  # AWS EC2 动态 inventory 插件（仅在使用 inventory/dynamic/aws_ec2.yml 时需要）
  # - name: amazon.aws
  #   version: ">=7.0.0"
