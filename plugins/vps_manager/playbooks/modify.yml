---
- name: Modify an onboarded VPS
  hosts: vps_targets
  become: true
  gather_facts: true
  vars:
    vps_changes: "{{ vps_task.get('changes', {}) }}"
    vps_package_changes: "{{ vps_task.get('changes', {}).get('packages', {}) }}"
    vps_firewall_changes: "{{ vps_task.get('changes', {}).get('firewall', {}) }}"
    vps_fail2ban: "{{ vps_task.get('changes', {}).get('fail2ban', {}) }}"
    vps_network_tuning: "{{ vps_task.get('changes', {}).get('network_tuning', {}) }}"

  tasks:
    - name: Install requested packages
      ansible.builtin.package:
        name: "{{ vps_package_changes.install | default([]) }}"
        state: present
      when: (vps_package_changes.install | default([])) | length > 0

    - name: Remove requested packages
      ansible.builtin.package:
        name: "{{ vps_package_changes.remove | default([]) }}"
        state: absent
      when: (vps_package_changes.remove | default([])) | length > 0

    - name: Apply requested UFW TCP allows
      community.general.ufw:
        rule: allow
        port: "{{ item | string }}"
        proto: tcp
      loop: "{{ vps_firewall_changes.allowed_tcp_ports | default([]) }}"
      when:
        - ansible_facts.os_family == 'Debian'
        - (vps_firewall_changes.allowed_tcp_ports | default([])) | length > 0

    - name: Apply optional BBR tuning
      ansible.posix.sysctl:
        name: net.ipv4.tcp_congestion_control
        value: bbr
        sysctl_set: true
        state: present
        reload: true
      when:
        - vps_network_tuning.enabled | default(false) | bool
        - vps_network_tuning.bbr | default(false) | bool

    - name: Apply optional TCP Fast Open tuning
      ansible.posix.sysctl:
        name: net.ipv4.tcp_fastopen
        value: "3"
        sysctl_set: true
        state: present
        reload: true
      when:
        - vps_network_tuning.enabled | default(false) | bool
        - vps_network_tuning.tcp_fastopen | default(false) | bool

    - name: Apply optional MTU probing tuning
      ansible.posix.sysctl:
        name: net.ipv4.tcp_mtu_probing
        value: "1"
        sysctl_set: true
        state: present
        reload: true
      when:
        - vps_network_tuning.enabled | default(false) | bool
        - vps_network_tuning.mtu_probing | default(false) | bool

    - name: Install fail2ban when requested
      ansible.builtin.package:
        name: fail2ban
        state: present
      when: vps_fail2ban.enabled | default(false) | bool

    - name: Configure fail2ban sshd jail
      ansible.builtin.template:
        src: "{{ vps_plugin_dir }}/templates/fail2ban_sshd.local.j2"
        dest: /etc/fail2ban/jail.d/sshd.local
        owner: root
        group: root
        mode: "0644"
      vars:
        vps_ssh:
          managed_port: "{{ ansible_port }}"
      when: vps_fail2ban.enabled | default(false) | bool

    - name: Ensure fail2ban is enabled after modification
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started
      when:
        - vps_fail2ban.enabled | default(false) | bool
        - not ansible_check_mode
