# dependabot.yml — 自动依赖更新配置
#
# Dependabot 会自动创建 PR 来更新过时的依赖。
# 文档: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
---
version: 2

updates:
  # GitHub Actions 版本更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
    # 每周最多 5 个更新 PR
    open-pull-requests-limit: 5

  # Python 依赖更新（pyproject.toml）
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
