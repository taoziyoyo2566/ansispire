# .github/workflows/ci.yml

---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install yamllint
      - run: yamllint .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible-lint
      - run: ansible-galaxy collection install -r requirements.yml
      - run: ansible-lint --profile production

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible-core
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      - run: ansible-playbook playbooks/site.yml --syntax-check -i inventory/production

  molecule:
    name: "Molecule / ${{ matrix.scenario }}"
    runs-on: ubuntu-latest
    needs: [ansible-lint, syntax-check]
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - common      # Tier 1: Ubuntu 22 + Rocky 9
          - webserver   # Tier 1: Ubuntu 22
          - database    # Tier 1: Ubuntu 22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible molecule molecule-plugins[docker] docker
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      - run: molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  detect-secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install detect-secrets
      - run: detect-secrets scan --baseline .secrets.baseline
