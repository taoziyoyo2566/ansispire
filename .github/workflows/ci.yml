# .github/workflows/ci.yml

---
name: CI

# stg is intentionally PR-only (no push trigger): pre-production reached
# exclusively via PR; direct pushes should be blocked by branch protection.
on:
  push:
    branches: [dev, master, "hotfix/*"]
  pull_request:
    branches: [dev, stg, master]

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install yamllint
      - run: yamllint .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Create disposable vault password file
        run: |
          umask 077
          python -c 'import secrets; print(secrets.token_urlsafe(32))' > .vault_pass
      - run: pip install -r requirements.txt
      - run: ansible-galaxy collection install -r requirements.yml
      - run: ansible-lint --profile production

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Create disposable vault password file
        run: |
          umask 077
          python -c 'import secrets; print(secrets.token_urlsafe(32))' > .vault_pass
      - run: pip install -r requirements.txt
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      - name: Syntax check Staging
        run: ansible-playbook playbooks/site.yml --syntax-check -i inventory/stag
      - name: Syntax check Production
        run: ansible-playbook playbooks/site.yml --syntax-check -i inventory/prod

  dry-run:
    name: Dry-run (check + diff)
    runs-on: ubuntu-latest
    needs: [ansible-lint, syntax-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Create disposable vault password file
        run: |
          umask 077
          python -c 'import secrets; print(secrets.token_urlsafe(32))' > .vault_pass
      - run: pip install -r requirements.txt
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      # 使用 --connection=local 不需要真实主机，验证 playbook 逻辑
      - run: |
          ansible-playbook playbooks/site.yml \
            -i inventory/stag \
            --check \
            --diff \
            --connection=local \
            -e "ansible_python_interpreter=$(which python3)"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m venv .venv
      - run: .venv/bin/pip install -r requirements.txt
      - run: make test-eda
      - run: make test-filters

  molecule:
    name: "Molecule / ${{ matrix.scenario }}"
    runs-on: ubuntu-latest
    needs: [ansible-lint, syntax-check, python-tests]
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - common      # Tier 1: Ubuntu 22 + Debian 12
          - webserver   # Tier 1: Ubuntu 22 + Debian 12
          - database    # Tier 1: Ubuntu 22 + Debian 12
          - full-stack  # 集成测试: Ubuntu 22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Create disposable vault password file
        run: |
          umask 077
          python -c 'import secrets; print(secrets.token_urlsafe(32))' > .vault_pass
      - run: pip install -r requirements.txt docker
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      - run: molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_HOST_KEY_CHECKING: "False"

  detect-secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/detect_secrets_gate.py

  # API contract preflight (WU-4) — spins a disposable Semaphore container,
  # runs bootstrap_preflight.yml in full mode against it. Two matrix entries:
  #   - pinned (must pass): the tag committed in config/manifest.yml
  #   - latest (continue-on-error): early warning of upstream schema drift
  api-contract:
    name: "API Contract / ${{ matrix.image_tag_kind }}"
    runs-on: ubuntu-latest
    needs: [ansible-lint]
    continue-on-error: ${{ matrix.image_tag_kind == 'latest' }}
    strategy:
      fail-fast: false
      matrix:
        image_tag_kind: [pinned, latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Create disposable vault password file
        run: |
          umask 077
          python -c 'import secrets; print(secrets.token_urlsafe(32))' > .vault_pass
      - run: python -m venv .venv
      - run: .venv/bin/pip install -r requirements.txt
      - name: Resolve SEMAPHORE_IMAGE_TAG
        run: |
          if [ "${{ matrix.image_tag_kind }}" = "latest" ]; then
            echo "SEMAPHORE_IMAGE_TAG=latest" >> "$GITHUB_ENV"
          fi
        # Pinned: run.sh will read ansispire_versions.semaphore_pinned from
        # config/manifest.yml — no env override needed.
      - run: make test-api-contract
