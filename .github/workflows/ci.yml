# .github/workflows/ci.yml

---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install yamllint
      - run: yamllint .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible-lint
      - run: ansible-galaxy collection install -r requirements.yml
      - run: ansible-lint --profile production

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible-core
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      - run: ansible-playbook playbooks/site.yml --syntax-check -i inventory/production

  dry-run:
    name: Dry-run (check + diff)
    runs-on: ubuntu-latest
    needs: [ansible-lint, syntax-check]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible-core
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      # 使用 --connection=local 不需要真实主机，验证 playbook 逻辑
      - run: |
          ansible-playbook playbooks/site.yml \
            -i inventory/staging \
            --check \
            --diff \
            --connection=local \
            -e "ansible_python_interpreter=$(which python3)"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  molecule:
    name: "Molecule / ${{ matrix.scenario }}"
    runs-on: ubuntu-latest
    needs: [ansible-lint, syntax-check]
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - common      # Tier 1: Ubuntu 22 + Rocky 9
          - webserver   # Tier 1: Ubuntu 22
          - database    # Tier 1: Ubuntu 22
          - full-stack  # 集成测试: common + webserver + database
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible molecule molecule-plugins[docker] docker
      - run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
      - run: molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_HOST_KEY_CHECKING: "False"

  detect-secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install detect-secrets
      - run: detect-secrets scan --baseline .secrets.baseline
