# ansible.cfg — project-level configuration
# Important: INI format does not support inline comments (key = value  # comment).
# Every comment must be on its own line and start with # or ;

[defaults]

# Inventory
inventory = inventory/production

# Role search path (project first, then global)
roles_path = roles:~/.ansible/roles

# Plugin paths (ensure custom filters/lookups are found)
filter_plugins = filter_plugins
lookup_plugins = lookup_plugins
callback_plugins = callback_plugins

# Collection search path (project-local first, then global)
collections_path = collections:~/.ansible/collections

# Output formatting (Ansible 2.12+ recommended style)
# Use modern callback settings
stdout_callback = default
ansible_managed = Ansible managed: {file} modified on %Y-%m-%d %H:%M:%S by {uid} on {host}
callbacks_enabled = timer, profile_tasks

# Concurrent host fan-out
forks = 10

# Fact-gathering strategy
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400

# Pipelining (reduces SSH round-trips; requires target-host support)
pipelining = true

# Vault password file (must be listed in .gitignore)
vault_password_file = .vault_pass

# Do not produce *.retry files
retry_files_enabled = false

# Show deprecation warnings
deprecation_warnings = true

# Python interpreter discovery
interpreter_python = auto_silent

# Suppress warnings
localhost_warning = false
display_skipped_hosts = false
action_warnings = false
collections_scan_sys_path = false

[callback_default]
# Ensure clean YAML-like output without using deprecated community plugin
result_format = yaml

[inventory]
# Ignore non-inventory files
ignore_extensions = .pyc, .pyo, .swp, .bak, ~, .orig

[privilege_escalation]
become = false
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
# accept-new: auto-accept on first connect, reject on subsequent key change (convenience + safety)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
pipelining = true
