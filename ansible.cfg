# ansible.cfg — 项目级配置，优先级高于 /etc/ansible/ansible.cfg
# 官方文档: https://docs.ansible.com/ansible/latest/reference_appendices/config.html

[defaults]
# ── Inventory ──────────────────────────────────────────────────────────────
inventory           = inventory/production     # 默认 inventory 目录

# ── Role 搜索路径 ────────────────────────────────────────────────────────────
roles_path          = roles:~/.ansible/roles   # 先找本项目 roles/，再找全局

# ── 输出 & 日志 ──────────────────────────────────────────────────────────────
stdout_callback     = yaml                     # 更易读的输出格式 (yaml/json/debug)
callbacks_enabled   = timer, profile_tasks     # 显示每个 task 耗时
log_path            = /tmp/ansible.log         # 本地日志（生产建议关闭）

# ── 性能 ─────────────────────────────────────────────────────────────────────
forks               = 10                       # 并发主机数，默认 5
gathering           = smart                    # 只在未缓存时收集 facts
fact_caching        = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400                   # facts 缓存 24 小时

# ── SSH 行为 ──────────────────────────────────────────────────────────────────
host_key_checking   = false                    # 测试环境关闭，生产建议开启
pipelining          = true                     # 减少 SSH 连接次数，显著提速
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s

# ── Vault ────────────────────────────────────────────────────────────────────
vault_password_file = .vault_pass              # 本地 vault 密码文件（加入 .gitignore）

# ── 重试文件 ─────────────────────────────────────────────────────────────────
retry_files_enabled = false                    # 不生成 *.retry 文件

# ── Deprecation 警告 ──────────────────────────────────────────────────────────
deprecation_warnings = true

[inventory]
# 忽略目录下的特定扩展名文件（README 等）
ignore_extensions = .pyc, .pyo, .swp, .bak, ~, .orig, .ini.orig

[privilege_escalation]
become              = false                    # 默认不提权，需要时在 play/task 级声明
become_method       = sudo
become_user         = root
become_ask_pass     = false

[ssh_connection]
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining          = true
