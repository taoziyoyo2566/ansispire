# ansible.cfg — 项目级配置
# 重要: INI 格式中行内注释（key = value  # comment）行为未定义
# 所有注释必须独占一行，以 # 或 ; 开头

[defaults]

# Inventory
inventory = inventory/production

# Role 搜索路径（先找本项目，再找全局）
roles_path = roles:~/.ansible/roles

# 输出格式（Ansible 2.12+ 推荐方式）
# stdout_callback 控制主输出；additional callbacks 用 callbacks_enabled
stdout_callback = yaml
callbacks_enabled = timer, profile_tasks

# 日志（生产环境建议通过 callback 而非本地文件）
# log_path = /tmp/ansible.log

# 并发主机数
forks = 10

# Facts 收集策略
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400

# 主机密钥检查（生产环境改为 true）
host_key_checking = false

# 流水线传输（显著减少 SSH 往返次数，需要目标主机支持）
pipelining = true

# Vault 密码文件（加入 .gitignore）
vault_password_file = .vault_pass

# 不生成 *.retry 文件
retry_files_enabled = false

# 显示废弃警告
deprecation_warnings = true

# Python 解释器发现策略（auto 会静默选择，auto_silent 不警告）
interpreter_python = auto_silent

[inventory]
# 忽略非 inventory 文件
ignore_extensions = .pyc, .pyo, .swp, .bak, ~, .orig

[privilege_escalation]
become = false
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = true
