# execution-environment.yml — Ansible Execution Environment definition
#
# The Execution Environment (EE) pins controller-side dependencies so CI, AWX/AAP, and local runs match.
#
# Build: ansible-builder build -t ansible-demo-ee:latest -f execution-environment.yml
# Run:   ansible-navigator run playbooks/site.yml --eei ansible-demo-ee:latest
# Docs:  https://ansible.readthedocs.io/projects/builder/

---
version: 3

images:
  base_image:
    name: ghcr.io/ansible/community-ee-base:latest

dependencies:
  python:
    - boto3>=1.28
    - botocore>=1.31
    - jmespath>=1.0        # required by community.general.json_query filter
    - netaddr>=0.9         # required by ansible.utils.ipaddr filter
    - pymysql>=1.1         # required by community.mysql modules
    - ansible-lint>=24.9   # lint baked into the EE (used by append_final verification)

  galaxy:
    collections:
      - name: community.general
        version: ">=8.0.0"
      - name: community.mysql
        version: ">=3.0.0"
      - name: ansible.posix
        version: ">=1.5.0"
      - name: amazon.aws
        version: ">=7.0.0"

  system:
    - openssh-clients [platform:rpm]
    - openssh-client [platform:dpkg]

additional_build_steps:
  append_final:
    - RUN ansible --version
    - RUN ansible-lint --version  # ansible-lint is already declared in python dependencies
