# roles/webserver/vars/main.yml
# vars/ — 优先级高于 defaults/，比 group_vars 低
# 用途: 存放不希望被外部轻易覆盖的内部常量

---
# 这些是内部常量，不应被外部覆盖
_webserver__nginx_conf_dir: /etc/nginx
_webserver__nginx_sites_available: /etc/nginx/sites-available
_webserver__nginx_sites_enabled: /etc/nginx/sites-enabled
_webserver__nginx_service: nginx

# OS 特定包名映射（只有在 vars/ 里定义才不会被意外覆盖）
_webserver__nginx_packages:
  Debian: nginx
  RedHat: nginx
