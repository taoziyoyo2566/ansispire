# roles/webserver/vars/main.yml
# vars/ — higher priority than defaults/, lower than group_vars
# Purpose: hold internal constants that should not be easily overridden externally

---
# These are internal constants; should not be overridden externally
_webserver__nginx_conf_dir: /etc/nginx
_webserver__nginx_sites_available: /etc/nginx/sites-available
_webserver__nginx_sites_enabled: /etc/nginx/sites-enabled
_webserver__nginx_service: nginx

# OS-specific package-name map (placed in vars/ to avoid accidental override)
_webserver__nginx_packages:
  Debian: nginx
  RedHat: nginx
