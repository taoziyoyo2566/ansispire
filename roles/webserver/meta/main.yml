---
galaxy_info:
  author: platform-team
  description: Install and configure Nginx web server with virtual hosts
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions: [focal, jammy, noble]
    - name: Debian
      versions: [bullseye, bookworm]
  galaxy_tags: [nginx, webserver, ssl]

# Dependencies: the common role runs before this role
dependencies:
  - role: common
    vars:
      common__extra_packages:
        - openssl
