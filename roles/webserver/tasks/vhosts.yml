# roles/webserver/tasks/vhosts.yml
#
# Note: do not apply `validate: nginx -t -c %s` to an individual vhost snippet.
# A vhost file is a server{} snippet, not a full nginx main config; `nginx -c`
# would treat it as the main entry file and raise a validation error.
# Correct approach: after deploying every vhost, run a dedicated `nginx -t`
# task to validate the full composed configuration.

---
- name: Deploy virtual host configurations
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "{{ _webserver__nginx_sites_available }}/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ webserver__vhosts }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload Nginx
  tags: [nginx, vhosts]

- name: Enable virtual hosts (create symlinks)
  ansible.builtin.file:
    src: "{{ _webserver__nginx_sites_available }}/{{ item.name }}.conf"
    dest: "{{ _webserver__nginx_sites_enabled }}/{{ item.name }}.conf"
    state: link
  loop: "{{ webserver__vhosts }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload Nginx
  tags: [nginx, vhosts]

# Discover existing vhost configs and remove any not in the list (idempotent cleanup)
- name: Find existing vhost configs
  ansible.builtin.find:
    paths: "{{ _webserver__nginx_sites_available }}"
    patterns: "*.conf"
    excludes: "default.conf"
  register: webserver_existing_vhosts
  tags: [nginx, vhosts, cleanup]

- name: Remove obsolete vhost configs
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ webserver_existing_vhosts.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: >
    (item.path | basename | replace('.conf', ''))
    not in (webserver__vhosts | map(attribute='name') | list)
  notify: Reload Nginx
  tags: [nginx, vhosts, cleanup]

# Once every vhost is deployed, validate the full composed nginx configuration
- name: Validate complete Nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  register: webserver_nginx_validate_result
  failed_when: webserver_nginx_validate_result.rc != 0
  tags: [nginx, vhosts, verify]
