# roles/webserver/tasks/configure.yml
# Demonstrates: template validate, lookup, check_mode awareness, conditional notify

---
# ── Main config file ────────────────────────────────────────────────────────
- name: Deploy Nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ _webserver__nginx_conf_dir }}/nginx.conf"
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c %s    # validate syntax before writing; never overwrite on failure
    backup: true                 # keep a .bak backup
  notify: Reload Nginx
  tags: [nginx, config]

# ── stat-based idempotency: does the config already exist? ──────────────────
- name: Check for existing SSL DH parameters
  ansible.builtin.stat:
    path: /etc/nginx/dhparam.pem
  register: webserver_dhparam_stat
  tags: [nginx, ssl]

# Only generate the file if it does not exist (openssl dhparam is slow)
- name: Generate DH parameters (2048 bit, runs once)
  ansible.builtin.command:
    cmd: openssl dhparam -out /etc/nginx/dhparam.pem 2048
    creates: /etc/nginx/dhparam.pem   # creates: skip if the file exists (idempotent)
  notify: Reload Nginx
  # throttle: running openssl on many hosts in parallel exhausts CPU; limit concurrency
  throttle: 1
  tags: [nginx, ssl]

# ── blockinfile: insert/update a content block at a specific spot ───────────
- name: Add security headers to nginx.conf
  ansible.builtin.blockinfile:
    path: "{{ _webserver__nginx_conf_dir }}/conf.d/security-headers.conf"
    create: true
    mode: "0644"
    # marker delimits the Ansible-managed block so the operation is idempotent
    marker: "# {mark} ANSIBLE MANAGED BLOCK - security headers"
    block: |
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  notify: Reload Nginx
  tags: [nginx, security]

# ── replace: precise pattern replacement (more accurate than lineinfile) ────
- name: Disable server_tokens in existing config
  ansible.builtin.replace:
    path: "{{ _webserver__nginx_conf_dir }}/nginx.conf"
    regexp: '^(\s*)#?\s*server_tokens\s+on;'
    replace: '\1server_tokens off;'
  notify: Reload Nginx
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [nginx, hardening]

# ── Configuration validation (does not mark tasks as changed) ───────────────
- name: Verify Nginx configuration syntax
  ansible.builtin.command: nginx -t
  changed_when: false    # validation commands do not produce changes
  register: webserver_nginx_test_result
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [nginx, verify]

- name: Show Nginx -t output on failure
  ansible.builtin.debug:
    msg: "{{ webserver_nginx_test_result.stderr_lines }}"
  when:
    - not ansible_check_mode
    - webserver_nginx_test_result is defined
    - webserver_nginx_test_result.rc is defined
    - webserver_nginx_test_result.rc != 0
  tags: [nginx, verify]

# ── logrotate configuration ─────────────────────────────────────────────────
- name: Configure Nginx log rotation
  ansible.builtin.copy:
    content: |
      {{ ansible_managed | comment }}
      /var/log/nginx/*.log {
          daily
          missingok
          rotate {{ log_retention_days | default(30) }}
          compress
          delaycompress
          notifempty
          create 0640 www-data adm
          sharedscripts
          postrotate
              nginx -s reopen
          endscript
      }
    dest: /etc/logrotate.d/nginx
    mode: "0644"
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [nginx, logrotate]
