# roles/infra_baseline/tasks/main.yml
#
# OS-family branching: Debian (Debian / Ubuntu) implemented inline in the
# Debian block below; RHEL family (Rocky / AlmaLinux / RHEL 9+) implemented
# via include_tasks: redhat.yml; Alpine remains a fail-stub until TASK-007.B.
#
# Task order rationale (TASK-007 D8): the Python ≥3.10 assert runs AFTER the
# per-family blocks — RHEL 9 ships Python 3.9, and redhat.yml installs 3.11
# + pivots ansible_python_interpreter before the assert. Debian/Ubuntu pass
# the assert either order since they already ship Python ≥3.12.
#
# Docker service start (`systemd: name=docker state=started`) lives INSIDE
# each per-family block so the OS-specific service manager can be used
# (Alpine will use OpenRC via ansible.builtin.service in TASK-007.B).
#
# Family-agnostic tail (group / user / sudo / authorized_key) runs on every
# host regardless of family.
---
# ── Debian family (Debian, Ubuntu) ──────────────────────────────────────
- name: Baseline | Debian-family setup
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Baseline | (Debian) Install prerequisite packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - rsync
        state: present
        update_cache: true

    - name: Baseline | (Debian) Add Docker GPG key
      ansible.builtin.get_url:
        url: "{{ infra_baseline_docker_gpg_url }}"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Baseline | (Debian) Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}
          signed-by=/etc/apt/keyrings/docker.asc]
          {{ infra_baseline_docker_repo_url }}
          {{ ansible_facts['distribution_release'] }}
          stable
        state: present
        filename: docker

    - name: Baseline | (Debian) Install Docker and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Baseline | (Debian) Ensure Docker service is running and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

# ── RHEL family (Rocky, AlmaLinux, RHEL 9+) ─────────────────────────────
- name: Baseline | RHEL-family setup
  ansible.builtin.include_tasks: redhat.yml
  when: ansible_facts['os_family'] == "RedHat"

# ── Alpine — STUB until TASK-007.B (no Alpine host provisioned 2026-05) ─
- name: Baseline | Alpine setup (NOT IMPLEMENTED)
  when: ansible_facts['os_family'] == "Alpine"
  ansible.builtin.fail:
    msg: >-
      Alpine infra_baseline is not implemented yet. This stub exists so
      {{ inventory_hostname }} doesn't silently skip baseline. Implement
      apk-based docker install in roles/infra_baseline/tasks/alpine.yml and
      replace this fail with `include_tasks: alpine.yml` (TASK-007.B).

# ── Family-agnostic tail (run on every host after per-family blocks) ────
# Python version assert MUST run after per-family blocks so redhat.yml gets
# a chance to install python3.11 + pivot interpreter (D8).
- name: Baseline | Assert Python version meets minimum requirements
  ansible.builtin.assert:
    that:
      - ansible_facts['python_version'] is version(infra_baseline_python_min_version, '>=')
    fail_msg: "Python version {{ ansible_facts['python_version'] }} is too old. Min required: {{ infra_baseline_python_min_version }}"

- name: Baseline | Create management group
  ansible.builtin.group:
    name: "{{ infra_baseline_mgr_user }}"
    state: present

- name: Baseline | Create management user with sudo access
  ansible.builtin.user:
    name: "{{ infra_baseline_mgr_user }}"
    group: "{{ infra_baseline_mgr_user }}"
    groups: "{{ infra_baseline_mgr_admin_group }}"
    append: true
    shell: "{{ infra_baseline_mgr_shell }}"
    state: present

- name: Baseline | Configure passwordless sudo for management user
  ansible.builtin.copy:
    content: "{{ infra_baseline_mgr_user }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ infra_baseline_mgr_user }}"
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Baseline | Set authorized key for management user
  ansible.builtin.shell:
    cmd: >-
      mkdir -p /home/{{ infra_baseline_mgr_user }}/.ssh &&
      cp /root/.ssh/authorized_keys /home/{{ infra_baseline_mgr_user }}/.ssh/ &&
      chown -R {{ infra_baseline_mgr_user }}:{{ infra_baseline_mgr_user }}
      /home/{{ infra_baseline_mgr_user }}/.ssh &&
      chmod 700 /home/{{ infra_baseline_mgr_user }}/.ssh &&
      chmod 600 /home/{{ infra_baseline_mgr_user }}/.ssh/authorized_keys
    creates: "/home/{{ infra_baseline_mgr_user }}/.ssh/authorized_keys"
