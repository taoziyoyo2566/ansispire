# roles/infra_baseline/tasks/main.yml
---
- name: Baseline | Assert Python version meets minimum requirements
  ansible.builtin.assert:
    that:
      - ansible_facts['python_version'] is version(infra_baseline_python_min_version, '>=')
    fail_msg: "Python version {{ ansible_facts['python_version'] }} is too old. Min required: {{ infra_baseline_python_min_version }}"

- name: Baseline | Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - rsync
    state: present
    update_cache: true

- name: Baseline | Add Docker GPG key
  ansible.builtin.get_url:
    url: "{{ infra_baseline_docker_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Baseline | Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc] {{ infra_baseline_docker_repo_url }} {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker

- name: Baseline | Install Docker and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Baseline | Ensure Docker service is running and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Baseline | Create management group
  ansible.builtin.group:
    name: "{{ infra_baseline_mgr_user }}"
    state: present

- name: Baseline | Create management user with sudo access
  ansible.builtin.user:
    name: "{{ infra_baseline_mgr_user }}"
    group: "{{ infra_baseline_mgr_user }}"
    groups: sudo
    append: true
    shell: "{{ infra_baseline_mgr_shell }}"
    state: present

- name: Baseline | Configure passwordless sudo for management user
  ansible.builtin.copy:
    content: "{{ infra_baseline_mgr_user }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ infra_baseline_mgr_user }}"
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Baseline | Set authorized key for management user (copy from current root)
  ansible.builtin.shell:
    cmd: "mkdir -p /home/{{ infra_baseline_mgr_user }}/.ssh && cp /root/.ssh/authorized_keys /home/{{ infra_baseline_mgr_user }}/.ssh/ && chown -R {{ infra_baseline_mgr_user }}:{{ infra_baseline_mgr_user }} /home/{{ infra_baseline_mgr_user }}/.ssh && chmod 700 /home/{{ infra_baseline_mgr_user }}/.ssh && chmod 600 /home/{{ infra_baseline_mgr_user }}/.ssh/authorized_keys"
    creates: "/home/{{ infra_baseline_mgr_user }}/.ssh/authorized_keys"

