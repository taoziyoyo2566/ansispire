---
# roles/ansispire_hub/tasks/main.yml
#
# Deploys the Ansispire hub (Semaphore + audit) onto a node in the [hub]
# group. Reads ports + image tags from config/manifest.yml (loaded by
# deploy_hub.yml's vars_files) and the admin password from
# inventory/local/vault.yml.
#
# Lifecycle:
#   1. Ensure /opt/ansispire/  exists       (code mirror)
#   2. Ensure /var/lib/ansispire/state/     (stateful files preserved
#                                            across deploys: .eda_token,
#                                            .security_keys)
#   3. rsync code into the mirror, with a strict exclude list so secrets
#      and stateful files NEVER leave the workstation
#   4. Mint or reuse Semaphore security keys (state/.security_keys —
#      ACCESS_KEY_ENCRYPTION + COOKIE_HASH + COOKIE_ENCRYPTION). Must
#      happen BEFORE the .env render: the template consumes them.
#   5. Render controller/semaphore/.env    (port + image tag + admin +
#                                            security keys)
#   6. Start controller/semaphore/docker-compose.yml as-is (no template
#      override — the committed compose file is the SSOT)
#   7. Mint or reuse EDA token from the state dir
- name: Hub | Initialize Environment
  block:
    - name: Hub | Ensure code directory
      ansible.builtin.file:
        path: "{{ ansispire_hub_base_dir }}"
        state: directory
        mode: '0755'

    - name: Hub | Ensure state directory
      ansible.builtin.file:
        path: "{{ ansispire_hub_state_dir }}"
        state: directory
        mode: '0700'

    - name: Hub | Sync Code
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ ansispire_hub_base_dir }}/"
        recursive: true
        delete: true
        rsync_opts:
          # ── Local-only artefacts (never relevant on the hub) ──
          - "--exclude=.git"
          - "--exclude=.venv"
          - "--exclude=.claude"
          - "--exclude=.ansible"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=*.pyo"
          - "--exclude=*.swp"
          - "--exclude=*~"
          - "--exclude=*.retry"
          # vps_manager inbox/logs/state — workstation-local only, must
          # never leak to the hub side
          - "--exclude=runtime/"
          # ── Secrets — must never leave the workstation ──
          - "--exclude=.vault_pass"
          - "--exclude=*.vault_pass"
          - "--exclude=controller/semaphore/.env"
          - "--exclude=controller/semaphore/.secrets"
          - "--exclude=controller/audit/e2e/.env"
          - "--exclude=controller/audit/e2e/.secrets"
          - "--exclude=controller/rbac/.demo_*.pw"
          - "--exclude=controller/rbac/users.yml"
          # ── Stateful files on the hub — preserve across re-deploys ──
          - "--exclude=.eda_token"
          # ── Documentation that's not needed at runtime ──
          - "--exclude=docs/reviews"
          - "--exclude=docs/investigations"

    # ── Security keys lifecycle ───────────────────────────────────────
    # state/.security_keys persists ACCESS_KEY_ENCRYPTION + COOKIE_HASH +
    # COOKIE_ENCRYPTION across re-deploys. If the file is wiped, every
    # already-stored Semaphore AccessKey becomes undecryptable and every
    # active session is invalidated — DO NOT delete .security_keys to
    # "fix" anything, restore from a backup instead.
    - name: Hub | Check Security Keys State
      ansible.builtin.stat:
        path: "{{ ansispire_hub_state_dir }}/.security_keys"
      register: ansispire_hub_security_keys_file

    - name: Hub | Generate Security Keys (first-deploy path)
      when:
        - not ansispire_hub_security_keys_file.stat.exists
        - not ansible_check_mode
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          set -eo pipefail
          umask 077
          ake=$(head -c32 /dev/urandom | base64)
          ch=$(head -c32 /dev/urandom | base64)
          ce=$(head -c32 /dev/urandom | base64)
          printf '{"access_key_encryption":"%s","cookie_hash":"%s","cookie_encryption":"%s"}' \
            "$ake" "$ch" "$ce" \
            > "{{ ansispire_hub_state_dir }}/.security_keys"
        creates: "{{ ansispire_hub_state_dir }}/.security_keys"

    - name: Hub | Re-stat Security Keys (post-mint)
      ansible.builtin.stat:
        path: "{{ ansispire_hub_state_dir }}/.security_keys"
      register: ansispire_hub_security_keys_file

    - name: Hub | Load Security Keys
      ansible.builtin.slurp:
        src: "{{ ansispire_hub_state_dir }}/.security_keys"
      register: ansispire_hub_security_keys_raw
      no_log: true
      when: ansispire_hub_security_keys_file.stat.exists

    - name: Hub | Set Security Keys Fact
      ansible.builtin.set_fact:
        ansispire_hub_security_keys: "{{ ansispire_hub_security_keys_raw.content | b64decode | from_json }}"
      no_log: true
      when: ansispire_hub_security_keys_raw.content is defined

    - name: Hub | Set Security Keys Placeholder (check-mode fresh host)
      # In --check on a fresh host the generate task is skipped and the
      # slurp has no file to read, so the template would fail with
      # "ansispire_hub_security_keys is undefined". Stuff a placeholder
      # so dry-run completes; real deploys never hit this branch.
      ansible.builtin.set_fact:
        ansispire_hub_security_keys:
          access_key_encryption: "__check_mode_placeholder__"
          cookie_hash: "__check_mode_placeholder__"
          cookie_encryption: "__check_mode_placeholder__"
      no_log: true
      when:
        - ansible_check_mode
        - ansispire_hub_security_keys is not defined

    - name: Hub | Render .env (manifest values + admin + security keys)
      ansible.builtin.template:
        src: semaphore_env.j2
        dest: "{{ ansispire_hub_base_dir }}/controller/semaphore/.env"
        mode: "0600"

    - name: Hub | Start Containers
      community.docker.docker_compose_v2:
        project_src: "{{ ansispire_hub_base_dir }}/controller/semaphore"
        state: present
        wait: true

- name: Hub | Wait for Service
  ansible.builtin.wait_for:
    port: "{{ ansispire_hub_port }}"
    timeout: 30

- name: Hub | Check for Token File
  ansible.builtin.stat:
    path: "{{ ansispire_hub_state_dir }}/.eda_token"
  register: ansispire_hub_token_file

- name: Hub | Provision Admin & Token
  # Skip in --check mode: API tasks below cannot actually call the live
  # Semaphore HTTP API in check mode, so cookies_string would be undefined
  # on a fresh host that has no token yet. Real runs (not check) mint
  # normally on first deploy and then idempotently skip on subsequent runs.
  when:
    - not ansispire_hub_token_file.stat.exists
    - not ansible_check_mode
  block:
    - name: API | Seed Admin
      ansible.builtin.command:
        cmd: >-
          docker exec ansispire-semaphore semaphore user add
          --admin --login "{{ ansispire_hub_admin_user }}"
          --name "Admin" --email "{{ ansispire_hub_admin_email }}"
          --password "{{ ansispire_hub_admin_password }}"
      register: ansispire_hub_seed_out
      failed_when: "ansispire_hub_seed_out.rc != 0 and 'UNIQUE' not in ansispire_hub_seed_out.stderr and 'exists' not in ansispire_hub_seed_out.stderr"
      changed_when: "'created' in ansispire_hub_seed_out.stdout"

    - name: API | Login
      ansible.builtin.uri:
        url: "http://localhost:{{ ansispire_hub_port }}/api/auth/login"
        method: POST
        body: { auth: "{{ ansispire_hub_admin_user }}", password: "{{ ansispire_hub_admin_password }}" }
        body_format: json
        status_code: [200, 204]
      register: ansispire_hub_login_out

    - name: API | Create Token
      ansible.builtin.uri:
        url: "http://localhost:{{ ansispire_hub_port }}/api/user/tokens"
        method: POST
        headers: { Cookie: "{{ ansispire_hub_login_out.cookies_string }}" }
        status_code: [200, 201]
      register: ansispire_hub_token_out

    - name: API | Save Token to State Dir
      ansible.builtin.copy:
        content: "{{ ansispire_hub_token_out.json.id }}"
        dest: "{{ ansispire_hub_state_dir }}/.eda_token"
        mode: '0600'

    # First-deploy path: set the fact directly from the mint response,
    # because the stat at the top of the file ran before the token file
    # existed, so the slurp below skips (its `when:` still sees stat=false).
    - name: API | Set Token Fact (first-deploy path)
      ansible.builtin.set_fact:
        ansispire_hub_eda_token: "{{ ansispire_hub_token_out.json.id }}"
      no_log: true

- name: Hub | Load Token from State Dir
  ansible.builtin.slurp:
    src: "{{ ansispire_hub_state_dir }}/.eda_token"
  register: ansispire_hub_token_raw
  when: ansispire_hub_token_file.stat.exists

- name: Hub | Set Token Fact (re-deploy path)
  ansible.builtin.set_fact:
    ansispire_hub_eda_token: "{{ ansispire_hub_token_raw.content | b64decode | trim }}"
  no_log: true
  when: ansispire_hub_token_raw.content is defined
