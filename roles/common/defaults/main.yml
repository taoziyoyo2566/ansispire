# roles/common/defaults/main.yml
# defaults/ — lowest-priority variables; can be overridden anywhere.
# Convention: prefix every role variable with the role name to avoid naming collisions.

---
# ── System requirements (checked during preflight) ──────────────────────────
common__required_packages:
  - acl            # For become_user support
  - tar            # For unarchive
  - unzip          # For unarchive
  - curl           # For URL checks

# Set to true via -e to skip the interactive pause and auto-install dependencies
common_auto_provision_targets: false

# Firewall toggle (set to false to skip UFW tasks in restricted environments)
common_ufw_enabled: true

# ── System packages ─────────────────────────────────────────────────────────
common__extra_packages: []          # lets callers append extra packages; empty by default

# ── Timezone ────────────────────────────────────────────────────────────────
common__timezone: "UTC"             # overridden by system_timezone in group_vars

# ── MOTD ────────────────────────────────────────────────────────────────────
common__motd_enabled: true
common__motd_message: "This server is managed by Ansible."

# ── sysctl tuning ───────────────────────────────────────────────────────────
common__sysctl_settings:
  net.ipv4.ip_forward: 0
  net.core.somaxconn: 1024
  vm.swappiness: 10

# ── User management ─────────────────────────────────────────────────────────
common__deploy_users: []
