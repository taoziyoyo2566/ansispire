# roles/common/vars/os/RedHat.yml
# Tier 1 supported platforms: Rocky Linux 9+, AlmaLinux 9+
# Tier 2 supported platforms: AlmaLinux 8, CentOS Stream 9

---
_common__os_packages:
  - epel-release
  - dnf-utils
  - policycoreutils-python-utils

_common__service_manager: systemd
_common__pkg_mgr: dnf
_common__ssh_service: sshd
_common__cron_service: crond
_common__firewall_pkg: firewalld
_common__firewall_service: firewalld
