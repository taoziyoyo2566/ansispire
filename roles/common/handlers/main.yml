# roles/common/handlers/main.yml
#
# Three core handler principles (official + community consensus):
#   1. Do service operations only (restart/reload/start/stop) — no complex logic
#   2. Use `listen` aliases instead of direct name references — decouples task and handler
#   3. Always use FQCN module names
#
# listen vs name:
#   - notify: "Restart SSH service" matches by name directly
#   - notify: "ssh changed"         matches every handler with listen: "ssh changed"
#   Advantage of listen: multiple handlers can subscribe to one event, and the task side writes only one notify.

---
# ── SSH ─────────────────────────────────────────────────────────────────────
- name: Restart SSH service
  ansible.builtin.systemd:
    name: "{{ _common__ssh_service | default('ssh') }}"
    state: restarted
  # `listen` lets the task notify by a semantic name; the handler name does not matter
  listen: Restart SSH service

# ── Cron ────────────────────────────────────────────────────────────────────
- name: Restart Cron service
  ansible.builtin.systemd:
    name: "{{ _common__cron_service | default('cron') }}"
    state: restarted
  listen: Restart cron service

# ── systemd daemon-reload (shared event for any task installing a unit) ─────
# Any task that installs a systemd unit only needs: notify: systemd daemon reload
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  listen: systemd daemon reload
