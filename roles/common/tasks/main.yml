# roles/common/tasks/main.yml
#
# import_tasks vs include_tasks — when to use which:
#   Use import_tasks when:
#     - tags must propagate (--tags penetrates into the child file)
#     - the filename is static
#   Use include_tasks when:
#     - the filename contains variables (which file to load is decided dynamically)
#     - a loop is needed
#     - tag propagation is not required

---
# ── Step 1: preflight checks (tags: always guarantees they run) ──────────────
- name: Run preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: [common, preflight, always]

# ── Step 2: load OS-specific variables ──────────────────────────────────────
# with_first_found: try each in order; load the first file that exists.
# This is the officially recommended pattern for cross-distro variable management.
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ lookup('ansible.builtin.first_found', os_vars_files) }}"
  vars:
    os_vars_files:
      files:
        # exact match: Ubuntu-22
        - "os/{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        # OS family match: Debian
        - "os/{{ ansible_os_family }}.yml"
        # fallback default
        - "os/default.yml"
      paths:
        - "{{ role_path }}/vars"
  tags: [common, always]

# ── Step 3: packages & users ────────────────────────────────────────────────
- name: Manage packages and users
  ansible.builtin.import_tasks: packages.yml
  tags: [common, packages, users]

# ── Step 4: security hardening ──────────────────────────────────────────────
- name: Apply security baseline
  ansible.builtin.import_tasks: security.yml
  tags: [common, security, hardening]
