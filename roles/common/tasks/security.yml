# roles/common/tasks/security.yml
# Demonstrates: register/changed_when/failed_when, async/poll, set_fact, check_mode awareness
#
# Cross-platform strategy:
#   - SSH hardening: universal (all platforms)
#   - Firewall:      UFW (Debian) / firewalld (RedHat), each under its own conditional
#   - fail2ban:      uses package_facts — cross-platform (avoids dpkg-query)
#   - async upgrade: invokes the appropriate package manager per OS family

---
# ── SSH hardening (cross-platform) ──────────────────────────────────────────
- name: Check if sshd_config exists
  ansible.builtin.stat:
    path: /etc/ssh/sshd_config
  register: common__sshd_config_stat
  tags: [ssh, hardening]

- name: Configure SSH hardening
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?{{ item.key }}\\s"
    line: "{{ item.key }} {{ item.value }}"
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  loop:
    - { key: PermitRootLogin, value: "{{ ssh_permit_root_login }}" }
    - { key: PasswordAuthentication, value: "{{ ssh_password_auth }}" }
    - { key: X11Forwarding, value: "no" }
    - { key: MaxAuthTries, value: "3" }
    - { key: ClientAliveInterval, value: "300" }
    - { key: ClientAliveCountMax, value: "2" }
    - { key: LoginGraceTime, value: "60" }
  notify: Restart SSH service
  when: common__sshd_config_stat.stat.exists
  tags: [ssh, hardening]

# ── Firewall: UFW (Debian/Ubuntu only) ──────────────────────────────────────
- name: Debug UFW status
  ansible.builtin.debug:
    msg: "UFW Enabled: {{ common_ufw_enabled | default(true) }} for {{ inventory_hostname }}"
  tags: [firewall]

- name: Install UFW (Debian)
  ansible.builtin.package:
    name: ufw
    state: present
  when:
    - ansible_os_family == 'Debian'
    - common_ufw_enabled | default(true)
  tags: [firewall]

- name: Detect IPv6 support
  ansible.builtin.stat:
    path: /proc/net/if_inet6
  register: common_ipv6_stat
  when:
    - ansible_os_family == 'Debian'
    - common_ufw_enabled | default(true)
  tags: [firewall]

- name: Configure UFW IPv6 support
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "^IPV6="
    line: "IPV6={{ 'yes' if common_ipv6_stat.stat.exists else 'no' }}"
  when:
    - ansible_os_family == 'Debian'
    - common_ufw_enabled | default(true)
    - common_ipv6_stat.stat is defined
  tags: [firewall]

- name: Set UFW default incoming policy to deny (Debian)
  community.general.ufw:
    default: deny
    direction: incoming
  when:
    - ansible_os_family == 'Debian'
    - common_ufw_enabled | default(true)
  tags: [firewall]

- name: Allow defined TCP ports via UFW (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports | default([22]) }}"
  when:
    - ansible_os_family == 'Debian'
    - common_ufw_enabled | default(true)
  tags: [firewall]

- name: Enable UFW (Debian)
  community.general.ufw:
    state: enabled
  when:
    - ansible_os_family == 'Debian'
    - common_ufw_enabled | default(true)
  tags: [firewall]

# ── Firewall: firewalld (RedHat/Rocky/Alma only) ────────────────────────────
- name: Install firewalld (RedHat)
  ansible.builtin.package:
    name: firewalld
    state: present
  when: ansible_os_family == 'RedHat'
  tags: [firewall]

- name: Start and enable firewalld (RedHat)
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  when: ansible_os_family == 'RedHat'
  tags: [firewall]

- name: Allow defined TCP ports via firewalld (RedHat)
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ firewall_allowed_tcp_ports | default([22]) }}"
  when: ansible_os_family == 'RedHat'
  tags: [firewall]

# ── fail2ban: probe via package_facts (cross-platform, no dpkg-query) ───────
- name: Gather installed package facts for fail2ban check
  ansible.builtin.package_facts:
    manager: auto
  tags: [fail2ban]

- name: Install fail2ban if not present
  ansible.builtin.package:
    name: fail2ban
    state: present
  when: "'fail2ban' not in ansible_facts.packages"
  tags: [fail2ban]

# ── limits.conf (universal) ─────────────────────────────────────────────────
- name: Check if custom limits.conf exists
  ansible.builtin.stat:
    path: /etc/security/limits.d/99-ansible.conf
  register: common_limits_conf_stat

- name: Deploy limits.conf
  ansible.builtin.copy:
    content: |
      # Managed by Ansible
      * soft nofile 65536
      * hard nofile 65536
      root soft nofile 65536
      root hard nofile 65536
    dest: /etc/security/limits.d/99-ansible.conf
    mode: "0644"
  when: not common_limits_conf_stat.stat.exists
  tags: [limits]

# ── set_fact: derived variables ─────────────────────────────────────────────
- name: Compute host identity facts
  ansible.builtin.set_fact:
    common_host_role: "{{ 'primary' if db_role is defined and db_role == 'primary' else 'secondary' }}"
    common_os_label: "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}"
    common_deploy_env: "{{ env | default('unknown') }}"
  tags: [facts]

- name: Show computed facts
  ansible.builtin.debug:
    msg:
      - "Host role: {{ common_host_role }}"
      - "OS: {{ common_os_label }} (Tier 1: {{ common_preflight_tier1 | default(false) }})"
      - "Environment: {{ common_deploy_env }}"
    verbosity: 1
  tags: [facts]

# ── Async OS upgrade (tagged 'never' — runs only with explicit --tags upgrade) ──
- name: Run full OS upgrade (async, Debian)
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  async: 900
  poll: 0
  register: common_upgrade_job_debian
  when: ansible_os_family == 'Debian'
  tags: [upgrade, never]

- name: Run full OS upgrade (async, RedHat)
  ansible.builtin.dnf:
    name: "*"
    state: latest  # noqa package-latest
  async: 900
  poll: 0
  register: common_upgrade_job_redhat
  when: ansible_os_family == 'RedHat'
  tags: [upgrade, never]

- name: Wait for OS upgrade to complete
  ansible.builtin.async_status:
    jid: >-
      {{ common_upgrade_job_debian.ansible_job_id
         if ansible_os_family == 'Debian'
         else common_upgrade_job_redhat.ansible_job_id }}
  register: common_upgrade_result
  until: common_upgrade_result.finished
  retries: 90
  delay: 10
  when:
    - (common_upgrade_job_debian is defined and common_upgrade_job_debian.ansible_job_id is defined) or
      (common_upgrade_job_redhat is defined and common_upgrade_job_redhat.ansible_job_id is defined)
  tags: [upgrade, never]

# ── check_mode awareness ────────────────────────────────────────────────────
- name: Collect service facts (safe in check mode)
  ansible.builtin.service_facts:
  check_mode: false
  tags: [facts, always]

- name: Show check-mode warning
  ansible.builtin.debug:
    msg: "Running in CHECK MODE — no changes will be made"
  when: ansible_check_mode
  tags: [always]
