# roles/common/tasks/packages.yml
# Demonstrates: package_facts, loop techniques, block/rescue/always, subelements, omit

---
# ── Collect installed package info (used for downstream idempotency checks) ─
- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto   # auto-detect apt/dnf/yum
  tags: [packages]

# ── OS-specific packages (loaded from vars/os/) + common packages ───────────
- name: Install OS-specific and common packages
  ansible.builtin.package:
    name: "{{ (_common__os_packages + common_packages + [_common__cron_service] + common__extra_packages) | unique }}"
    state: present
  tags: [packages]

# ── Timezone ────────────────────────────────────────────────────────────────
- name: Set system timezone
  community.general.timezone:
    name: "{{ system_timezone | default(common__timezone) }}"
  notify: Restart cron service
  tags: [timezone]

# ── User management: complete block/rescue/always example ───────────────────
- name: Manage application user and directory
  tags: [users, appdir]
  block:
    - name: Ensure app group exists
      ansible.builtin.group:
        name: "{{ app_group }}"
        system: true
        state: present

    - name: Ensure app user exists
      ansible.builtin.user:
        name: "{{ app_user }}"
        group: "{{ app_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ app_base_dir }}"
        create_home: false
        state: present

    - name: Create app base directory
      ansible.builtin.file:
        path: "{{ app_base_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

  rescue:
    - name: Notify failure via syslog
      community.general.syslogger:
        msg: >
          [ansible] Failed to create app user/dir on {{ inventory_hostname }}.
          Error: {{ ansible_failed_result.msg | default('unknown') }}
        priority: err

    - name: Re-raise the original failure
      ansible.builtin.fail:
        msg: "App user setup failed: {{ ansible_failed_result.msg | default('unknown') }}"

  always:
    - name: Verify app user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ app_user }}"
      register: common_app_user_check
      failed_when: false

    - name: Report user check result
      ansible.builtin.debug:
        msg: "App user '{{ app_user }}': {{ 'exists' if common_app_user_check.ansible_facts is defined else 'MISSING' }}"
        verbosity: 1    # verbosity: only shown with -v; reduces normal-run noise

# ── Create deploy users (loop + loop_control) ───────────────────────────────
- name: Create deploy users
  ansible.builtin.user:
    name: "{{ item.name }}"
    uid: "{{ item.uid | default(omit) }}"
    groups: "{{ item.groups | default([]) }}"
    append: true
    shell: /bin/bash
    create_home: true
    state: present
  loop: "{{ common__deploy_users }}"
  loop_control:
    label: "{{ item.name }}"
    pause: 0
  when: common__deploy_users | length > 0
  tags: [users]

# ── Deploy SSH public keys (subelements expands nested lists) ───────────────
- name: Add authorized SSH keys for deploy users
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
  loop: "{{ common__deploy_users | subelements('authorized_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"
  no_log: true
  tags: [users, ssh]

# ── sysctl tuning (dict2items → loop) ───────────────────────────────────────
- name: Apply sysctl performance tuning
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value | string }}"
    sysctl_set: true
    state: present
    reload: true
  loop: "{{ common__sysctl_settings | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  tags: [sysctl, tuning]

# ── Deploy MOTD ─────────────────────────────────────────────────────────────
- name: Deploy MOTD
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
  when: common__motd_enabled | bool
  tags: [motd]
