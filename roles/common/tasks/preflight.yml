# roles/common/tasks/preflight.yml
# Pre-flight checks — validate prerequisites before the rest of the role runs
#
# Platform support tiers (see docs/reviews/platform-support-addendum-2026-04-09.md):
#   Tier 1 — supported by default and continuously CI-verified:
#             Ubuntu 20.04+ / Rocky Linux 9+ / AlmaLinux 9+
#   Tier 2 — code skeleton exists, not yet in CI:
#             Debian 11+  / AlmaLinux 8 / CentOS Stream 9
#   Tier 3 — needs extra bootstrap; outside the default-path commitment:
#             Alpine / minimal images / hosts without Python

---
# ── OS support check (Tier 1 + Tier 2) ──────────────────────────────────────
- name: Preflight | Assert supported OS family
  ansible.builtin.assert:
    that:
      - ansible_os_family in ['Debian', 'RedHat']
    fail_msg: >
      Unsupported OS family: {{ ansible_os_family }}
      ({{ ansible_distribution }} {{ ansible_distribution_version }}).
      Supported families: Debian (Ubuntu/Debian), RedHat (Rocky/Alma/RHEL/CentOS Stream).
    success_msg: "OS family check passed: {{ ansible_os_family }}"
  tags: [always, preflight]

# ── Tier 1 version check (warn, don't fail — let Tier 2 continue) ───────────
- name: Preflight | Check if running on Tier 1 tested platform
  ansible.builtin.set_fact:
    _preflight_tier1: >-
      {{
        (ansible_distribution == 'Ubuntu' and ansible_distribution_major_version | int >= 20) or
        (ansible_distribution in ['Rocky', 'AlmaLinux'] and ansible_distribution_major_version | int >= 9)
      }}
  tags: [always, preflight]

- name: Preflight | Warn if not on Tier 1 platform
  ansible.builtin.debug:
    msg: >
      WARNING: {{ ansible_distribution }} {{ ansible_distribution_version }} is
      not a Tier 1 tested platform for this demo.
      Tier 1 = Ubuntu 20.04+, Rocky 9+, AlmaLinux 9+.
      You may encounter untested behavior. See docs/reviews/platform-support-addendum-2026-04-09.md
  when: not _preflight_tier1
  tags: [always, preflight]

# ── Ansible version check ───────────────────────────────────────────────────
- name: Preflight | Assert minimum Ansible version
  ansible.builtin.assert:
    that:
      - ansible_version.full is version('2.14', '>=')
    fail_msg: "Ansible >= 2.14 required, found {{ ansible_version.full }}"
  tags: [always, preflight]

# ── Required-variable check ─────────────────────────────────────────────────
- name: Preflight | Assert mandatory variables are set
  ansible.builtin.assert:
    that:
      - system_timezone is defined
      - system_timezone | length > 0
    fail_msg: "system_timezone must be set (e.g. Asia/Shanghai)"
  tags: [always, preflight]

# ── Disk-space check ────────────────────────────────────────────────────────
- name: Preflight | Gather hardware facts for disk check
  ansible.builtin.setup:
    gather_subset:
      - hardware
  tags: [always, preflight]

- name: Preflight | Assert sufficient disk space on /
  ansible.builtin.assert:
    that:
      - (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_available > 1073741824
    fail_msg: >
      Less than 1GB free on /.
      Available: {{ (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_available | human_readable }}
  tags: [always, preflight]

# ── Network connectivity check (warn only — intranets may lack public access) ─
- name: Preflight | Check internet connectivity
  ansible.builtin.uri:
    url: https://{{ 'archive.ubuntu.com' if ansible_os_family == 'Debian' else 'dl.rockylinux.org' }}
    method: HEAD
    timeout: 10
  register: internet_check
  failed_when: false
  changed_when: false
  tags: [always, preflight]

- name: Preflight | Warn if no internet access
  ansible.builtin.debug:
    msg: "WARNING: No internet access detected. Package installation may fail if not using a local mirror."
  when: internet_check.status is not defined or internet_check.status != 200
  tags: [always, preflight]

# ── Python interpreter check ────────────────────────────────────────────────
- name: Preflight | Assert Python 3 is available
  ansible.builtin.assert:
    that:
      - ansible_python_version is version('3.6', '>=')
    fail_msg: "Python 3.6+ required on target host, found {{ ansible_python_version }}"
  tags: [always, preflight]
