---
- name: Install MySQL server
  ansible.builtin.package:
    name:
      - mysql-server
      - mysql-client
      - python3-mysqldb     # required by community.mysql modules
    state: present

- name: Ensure MySQL is started and enabled
  ansible.builtin.systemd:
    name: mysql
    state: started
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"
