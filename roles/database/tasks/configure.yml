# roles/database/tasks/configure.yml
# Demonstrates: no_log, community.mysql module, cron-based backup

---
- name: Deploy MySQL configuration
  ansible.builtin.template:
    src: my.cnf.j2
    dest: /etc/mysql/mysql.conf.d/mysqld.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart MySQL

- name: Set MySQL root password
  community.mysql.mysql_user:
    name: root
    password: "{{ database__mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present
  no_log: true
  tags: [mysql, security]

- name: Create application databases
  community.mysql.mysql_db:
    name: "{{ item.name }}"
    encoding: "{{ item.encoding | default('utf8mb4') }}"
    collation: "{{ item.collation | default('utf8mb4_unicode_ci') }}"
    state: present
    login_user: root
    login_password: "{{ database__mysql_root_password }}"
  loop: "{{ database__databases }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Create MySQL users
  community.mysql.mysql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    priv: "{{ item.priv }}"
    host: "{{ item.host | default('%') }}"
    state: present
    login_user: root
    login_password: "{{ database__mysql_root_password }}"
  loop: "{{ database__users }}"
  loop_control:
    label: "{{ item.name }}@{{ item.host | default('%') }}"
  no_log: true
  tags: [mysql, users]

# ── Backup (conditional deployment) ─────────────────────────────────────────
- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ database__backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: database__backup_enabled | bool
  tags: [mysql, backup]

- name: Deploy MySQL backup script
  ansible.builtin.template:
    src: backup.sh.j2
    dest: /usr/local/bin/mysql-backup.sh
    mode: "0750"
    owner: root
    group: root
  when: database__backup_enabled | bool
  tags: [mysql, backup]

- name: Schedule MySQL backup cron job
  ansible.builtin.cron:
    name: MySQL daily backup
    user: root
    minute: "0"
    hour: "2"
    job: /usr/local/bin/mysql-backup.sh >> /var/log/mysql-backup.log 2>&1
    state: present
  when: database__backup_enabled | bool
  tags: [mysql, backup]
