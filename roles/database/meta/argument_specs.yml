# roles/database/meta/argument_specs.yml
#
# Design note for database__mysql_root_password:
#   - argument_specs marks it required: true
#   - defaults/main.yml intentionally does NOT set a default (removed)
#   - Callers must inject it explicitly via group_vars + vault
#
#   Why no default in defaults?
#   If defaults/main.yml said
#     database__mysql_root_password: "{{ vault_db_root_password }}"
#   then when the vault is not decrypted or vault_db_root_password is undefined,
#   the Jinja2 in defaults would evaluate to a literal un-expanded string, pass
#   `required` validation, and fail at actual use with a cryptic error.
#   Removing the default from defaults makes `required: true` fail immediately
#   before the role runs, producing a much clearer error message.

---
argument_specs:
  main:
    short_description: Install and configure MySQL with optional replication
    description: |
      Installs MySQL, creates databases and users, optionally configures
      primary/replica replication based on the db_role host variable.
      Tier 1 (tested): Ubuntu 20.04+.
      RedHat-compatible support is Tier 2 (skeleton exists, not yet implemented or tested).
    author: platform-team

    options:
      database__mysql_root_password:
        type: str
        required: true
        no_log: true
        description: >
          MySQL root password. Must be provided by the caller via vault.
          No default is set intentionally — see file header for explanation.
          Example: set vault_db_root_password in
          inventory/production/group_vars/all/vault.yml
          and reference it as: database__mysql_root_password: "{{ vault_db_root_password }}"

      database__mysql_bind_address:
        type: str
        required: false
        default: "127.0.0.1"
        description: >
          MySQL bind address. Use 0.0.0.0 to allow remote connections
          (ensure firewall rules are in place first).

      database__mysql_port:
        type: int
        required: false
        default: 3306
        description: MySQL listen port

      database__mysql_innodb_buffer_pool_size:
        type: str
        required: false
        default: "512M"
        description: >
          InnoDB buffer pool size. Rule of thumb: 70-80% of RAM for
          dedicated DB servers (e.g. "2G" for 3GB RAM host).

      database__mysql_max_connections:
        type: int
        required: false
        default: 150
        description: max_connections value

      database__databases:
        type: list
        elements: dict
        required: false
        default: []
        description: Databases to create
        options:
          name:
            type: str
            required: true
          encoding:
            type: str
            required: false
            default: utf8mb4
          collation:
            type: str
            required: false
            default: utf8mb4_unicode_ci

      database__users:
        type: list
        elements: dict
        required: false
        default: []
        description: MySQL users to create
        options:
          name:
            type: str
            required: true
          password:
            type: str
            required: true
            no_log: true
          priv:
            type: str
            required: true
            description: "Privilege string, e.g. 'mydb.*:ALL'"
          host:
            type: str
            required: false
            default: "%"

      database__backup_enabled:
        type: bool
        required: false
        default: false
        description: Enable automated MySQL backups via cron

      database__backup_dir:
        type: str
        required: false
        default: /backups/mysql
        description: Directory for backup files

      database__backup_retention_days:
        type: int
        required: false
        default: 7
        description: Days to retain backup files
