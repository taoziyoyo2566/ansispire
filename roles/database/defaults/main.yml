# roles/database/defaults/main.yml
#
# Note: database__mysql_root_password has no default here on purpose.
# See meta/argument_specs.yml header for the full rationale.
# The caller must supply this variable explicitly via vault.

---
database__mysql_version: "8.0"
database__mysql_port: 3306
database__mysql_bind_address: "127.0.0.1"
database__mysql_datadir: /var/lib/mysql
database__mysql_log_dir: /var/log/mysql

database__mysql_innodb_buffer_pool_size: "512M"
database__mysql_max_connections: 150

database__databases: []
database__users: []

database__backup_enabled: false
database__backup_dir: /backups/mysql
database__backup_retention_days: 7
